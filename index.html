<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hifz Companion - v170 Super-FAB</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden; 
        }
        .font-naskh { font-family: 'Amiri', serif; line-height: 2.2; }
        .animate-in { animation: fadeIn 0.25s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .no-select { -webkit-user-select: none; user-select: none; }
        button:active { transform: scale(0.96); }
        
        .main-scroll-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            /* Added extra padding since bottom nav is gone */
            padding-bottom: calc(env(safe-area-inset-bottom) + 120px);
        }

        .verse-card {
            min-height: 300px;
            max-height: 55vh;
            display: flex;
            flex-direction: column;
        }
        .verse-text-scroll {
            overflow-y: auto;
            flex: 1;
            padding-right: 8px;
            text-align: center;
        }
        .quiz-card {
            height: 180px;
            perspective: 1000px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const LucideIcon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
            return <i data-lucide={name} className={className}></i>;
        };

        const SURAHS_META = [
            { id: 1, name: "Al-Fatihah", english: "The Opener" },
            { id: 67, name: "Al-Mulk", english: "The Sovereignty" },
            { id: 78, name: "An-Naba", english: "The Tidings" },
            { id: 79, name: "An-Nazi'at", english: "Those Who Drag Forth" },
            { id: 80, name: "'Abasa", english: "He Frowned" },
            { id: 81, name: "At-Takwir", english: "The Overthrowing" },
            { id: 82, name: "Al-Infitar", english: "The Cleaving" },
            { id: 83, name: "Al-Mutaffifin", english: "The Defrauding" },
            { id: 84, name: "Al-Inshiqaq", english: "The Sundering" },
            { id: 85, name: "Al-Buruj", english: "The Mansions" },
            { id: 86, name: "At-Tariq", english: "The Nightcomer" },
            { id: 87, name: "Al-A'la", english: "The Most High" },
            { id: 88, name: "Al-Ghashiyah", english: "The Overwhelming" },
            { id: 89, name: "Al-Fajr", english: "The Dawn" },
            { id: 90, name: "Al-Balad", english: "The City" },
            { id: 91, name: "Ash-Shams", english: "The Sun" },
            { id: 92, name: "Al-Layl", english: "The Night" },
            { id: 93, name: "Ad-Duha", english: "The Morning Hours" },
            { id: 94, name: "Ash-Sharh", english: "The Relief" },
            { id: 95, name: "At-Tin", english: "The Fig" },
            { id: 96, name: "Al-'Alaq", english: "The Clot" },
            { id: 97, name: "Al-Qadr", english: "The Power" },
            { id: 98, name: "Al-Bayyinah", english: "The Clear Proof" },
            { id: 99, name: "Az-Zalzalah", english: "The Earthquake" },
            { id: 100, name: "Al-'Adiyat", english: "The Courser" },
            { id: 101, name: "Al-Qari'ah", english: "The Calamity" },
            { id: 102, name: "At-Takathur", english: "Worldly Increase" },
            { id: 103, name: "Al-'Asr", english: "The Declining Day" },
            { id: 104, name: "Al-Humazah", english: "The Traducer" },
            { id: 105, name: "Al-Fil", english: "The Elephant" },
            { id: 106, name: "Quraysh", english: "Quraysh" },
            { id: 107, name: "Al-Ma'un", english: "Small Kindnesses" },
            { id: 108, name: "Al-Kawthar", english: "Abundance" },
            { id: 109, name: "Al-Kafirun", english: "The Disbelievers" },
            { id: 110, name: "An-Nasr", english: "Divine Support" },
            { id: 111, name: "Al-Masad", english: "The Palm Fiber" },
            { id: 112, name: "Al-Ikhlas", english: "The Sincerity" },
            { id: 113, name: "Al-Falaq", english: "The Daybreak" },
            { id: 114, name: "An-Nas", english: "Mankind" }
        ];

        const FATIHAH_BUILTIN = [
            { ayah: 1, arabic: "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", transliteration: "Bismillaahir Rahmaanir Raheem", english: "In the name of Allah, the Entirely Merciful, the Especially Merciful.", tafsir: "Invoke His mercy." },
            { ayah: 2, arabic: "الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ", transliteration: "Alhamdu lillaahi Rabbil 'aalameen", english: "[All] praise is [due] to Allah, Lord of the worlds -", tafsir: "Gratitude." },
            { ayah: 3, arabic: "الرَّحْمَٰنِ الرَّحِيمِ", transliteration: "Ar-Rahmaanir-Raheem", english: "The Entirely Merciful, the Especially Merciful,", tafsir: "Mercy." },
            { ayah: 4, arabic: "مَالِكِ يَوْمِ الدِّينِ", transliteration: "Maaliki Yawmid-Deen", english: "Sovereign of the Day of Recompense.", tafsir: "Accountability." },
            { ayah: 5, arabic: "إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ", transliteration: "Iyyaaka na'budu wa iyyaaka nasta'een", english: "It is You we worship and You we ask for help.", tafsir: "Dependence." },
            { ayah: 6, arabic: "اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ", transliteration: "Ihdinas-Siraatal-Mustaqeem", english: "Guide us to the straight path -", tafsir: "Direction." },
            { ayah: 7, arabic: "صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ", transliteration: "Siraatal-ladheena an'amta 'alayhim ghayril-maghdoobi 'alayhim walad-daalleen", english: "The path of those upon whom You have bestowed favor, not of those who have evoked [Your] anger or of those who are astray.", tafsir: "Righteousness." }
        ];

        function App() {
            const [showSplash, setShowSplash] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [theme, setTheme] = useState('dark');
            const [localDatabase, setLocalDatabase] = useState([]);
            const [memorizedAyahs, setMemorizedAyahs] = useState([]);
            const [voiceGender, setVoiceGender] = useState('male');
            const [audioEngine, setAudioEngine] = useState('cloud');
            const [reciterId, setReciterId] = useState('ar.alafasy'); 

            const [learningContext, setLearningContext] = useState({
                surahInfo: SURAHS_META[0],
                verse: FATIHAH_BUILTIN[0],
                surahData: FATIHAH_BUILTIN,
                currentIndex: 0
            });

            const [selectedSurah, setSelectedSurah] = useState(null);
            const [librarySurahData, setLibrarySurahData] = useState([]);
            
            const [isFabOpen, setIsFabOpen] = useState(false);
            const [isJumpOpen, setIsJumpOpen] = useState(false);
            const [isLowEnergyOpen, setIsLowEnergyOpen] = useState(false);
            const [pendingSession, setPendingSession] = useState(null);

            // --- Initial Load Logic ---
            useEffect(() => {
                const vault = localStorage.getItem('hifz_vault_v170');
                if (vault) setLocalDatabase(JSON.parse(vault));
                const progress = localStorage.getItem('hifz_progress_v170');
                if (progress) setMemorizedAyahs(JSON.parse(progress));

                const lastSession = localStorage.getItem('hifz_session_v170');
                if (lastSession) {
                    setPendingSession(JSON.parse(lastSession));
                }

                setTimeout(() => setShowSplash(false), 2000);
            }, []);

            // --- Autosave logic ---
            useEffect(() => {
                if (showSplash || pendingSession) return;
                const session = { activeTab, learningContext, selectedSurah, librarySurahData };
                localStorage.setItem('hifz_session_v170', JSON.stringify(session));
            }, [activeTab, learningContext, selectedSurah, librarySurahData]);

            const handleResume = () => {
                if (pendingSession) {
                    setActiveTab(pendingSession.activeTab);
                    if (pendingSession.learningContext) setLearningContext(pendingSession.learningContext);
                    if (pendingSession.selectedSurah) setSelectedSurah(pendingSession.selectedSurah);
                    if (pendingSession.librarySurahData) setLibrarySurahData(pendingSession.librarySurahData);
                }
                setPendingSession(null);
            };

            const handleStartFresh = () => {
                setPendingSession(null);
                localStorage.removeItem('hifz_session_v170');
            };

            const handleSelectVerse = (verse, surahData, index, surahInfo) => {
                setLearningContext({ verse, surahData, currentIndex: index, surahInfo });
                setActiveTab('memorize');
                setIsFabOpen(false);
                setIsJumpOpen(false);
            };

            const logMemorized = (sId, aNum) => {
                const key = `${sId}:${aNum}`;
                if (!memorizedAyahs.includes(key)) {
                    const nextProgress = [...memorizedAyahs, key];
                    setMemorizedAyahs(nextProgress);
                    localStorage.setItem('hifz_progress_v170', JSON.stringify(nextProgress));
                }
            };

            const playAudio = (text, surahId = null, ayahNum = null) => {
                if (surahId && ayahNum && audioEngine === 'cloud') {
                    fetch(`https://api.alquran.cloud/v1/ayah/${surahId}:${ayahNum}/${reciterId}`)
                        .then(res => res.json())
                        .then(data => {
                            if (data.data && data.data.audio) {
                                new Audio(data.data.audio).play();
                            } else playRoboticTTS(text);
                        })
                        .catch(() => playRoboticTTS(text));
                    return;
                }
                playRoboticTTS(text);
            };

            const playRoboticTTS = (text) => {
                if (audioEngine === 'cloud') {
                    const audio = new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&tl=ar&client=tw-ob&q=${encodeURIComponent(text)}`);
                    if (voiceGender === 'male') audio.playbackRate = 0.9;
                    audio.play();
                } else {
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'ar-SA';
                    u.pitch = voiceGender === 'male' ? 0.8 : 1.1;
                    window.speechSynthesis.speak(u);
                }
            };

            if (showSplash) return <SplashScreen />;

            return (
                <div className={`${theme === 'dark' ? 'dark' : ''} h-screen h-[100dvh] flex flex-col relative`}>
                    
                    {/* Resume Session Modal */}
                    {pendingSession && (
                        <div className="fixed inset-0 z-[200] bg-slate-950 flex items-center justify-center p-6 text-center animate-in fade-in">
                            <div className="max-w-xs w-full bg-white dark:bg-slate-900 rounded-3xl p-8 shadow-2xl border border-emerald-500/20">
                                <div className="w-16 h-16 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <LucideIcon name="bookmark" className="text-emerald-500 w-8 h-8" />
                                </div>
                                <h2 className="text-xl font-bold mb-2">Welcome Back</h2>
                                <p className="text-sm text-stone-500 dark:text-stone-400 mb-8 leading-relaxed">
                                    Would you like to continue your session from where you left off?
                                </p>
                                <div className="flex flex-col gap-3">
                                    <button onClick={handleResume} className="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold active:scale-95 transition-transform shadow-lg">Resume Session</button>
                                    <button onClick={handleStartFresh} className="w-full py-4 bg-stone-100 dark:bg-slate-800 text-stone-500 rounded-2xl font-bold active:scale-95 transition-transform">Start Fresh</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="flex-1 bg-stone-50 dark:bg-slate-900 text-stone-800 dark:text-slate-100 font-sans overflow-hidden flex flex-col relative">
                        
                        <header className="bg-emerald-800 dark:bg-slate-950 text-stone-50 p-4 shadow-xl z-50 flex items-center justify-between shrink-0 pt-[env(safe-area-inset-top)] h-[calc(4rem+env(safe-area-inset-top))]">
                            <div className="flex items-center gap-3">
                                {(activeTab === 'qaida' || selectedSurah || activeTab === 'memorize') && (
                                    <button onClick={() => { if(selectedSurah) setSelectedSurah(null); else setActiveTab('dashboard'); }} className="p-2 bg-white/10 rounded-xl active:scale-90 transition-transform">
                                        <LucideIcon name="arrow-left" />
                                    </button>
                                )}
                                <h1 className="text-lg font-bold tracking-widest uppercase">Hifz Companion</h1>
                            </div>
                            <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="p-2 bg-white/10 rounded-xl">
                                <LucideIcon name={theme === 'dark' ? "sun" : "moon"} />
                            </button>
                        </header>

                        <div className="flex-1 main-scroll-area px-4 pt-6">
                            {activeTab === 'dashboard' && <Dashboard localDatabase={localDatabase} memorizedAyahs={memorizedAyahs} />}
                            {activeTab === 'qaida' && (
                                <Qaida 
                                    localDatabase={localDatabase}
                                    gender={voiceGender} setGender={setVoiceGender} 
                                    engine={audioEngine} setEngine={setAudioEngine} 
                                    play={playRoboticTTS}
                                />
                            )}
                            {activeTab === 'explorer' && (
                                <Explorer 
                                    localDatabase={localDatabase} setLocalDatabase={setLocalDatabase}
                                    selectedSurah={selectedSurah} setSelectedSurah={setSelectedSurah}
                                    librarySurahData={librarySurahData} setLibrarySurahData={setLibrarySurahData}
                                    onSelectVerse={handleSelectVerse} playNative={playAudio}
                                />
                            )}
                            {activeTab === 'memorize' && (
                                <Memorize 
                                    context={learningContext} setContext={setLearningContext} 
                                    logMemorized={logMemorized} memorizedList={memorizedAyahs}
                                    playNative={playAudio}
                                />
                            )}
                        </div>

                        {/* OPTION 1: SUPER-FAB (Consolidated Menu) */}
                        {isFabOpen && <div className="fixed inset-0 bg-black/70 z-[60] animate-in fade-in" onClick={() => setIsFabOpen(false)}></div>}
                        <div className="fixed bottom-10 right-4 flex flex-col items-end gap-3 z-[70] pb-[env(safe-area-inset-bottom)]">
                            {isFabOpen && (
                                <div className="flex flex-col items-end gap-3 mb-2 animate-in slide-in-from-bottom-4">
                                    {/* Navigation Group */}
                                    <div className="flex flex-col items-end gap-3 pb-3 mb-3 border-b border-white/10">
                                        <FabItem icon="home" label="Home" color="text-sky-400" onClick={() => { setActiveTab('dashboard'); setSelectedSurah(null); setIsFabOpen(false); }} active={activeTab === 'dashboard'} />
                                        <FabItem icon="book" label="Library" color="text-amber-400" onClick={() => { setActiveTab('explorer'); setSelectedSurah(null); setIsFabOpen(false); }} active={activeTab === 'explorer'} />
                                        <FabItem icon="target" label="Learn" color="text-rose-400" onClick={() => { setActiveTab('memorize'); setIsFabOpen(false); }} active={activeTab === 'memorize'} />
                                    </div>
                                    {/* Tools Group */}
                                    <FabItem icon="battery-low" label="Low Energy" color="text-orange-500" onClick={() => { setIsLowEnergyOpen(true); setIsFabOpen(false); }} />
                                    <FabItem icon="search" label="Teleport" color="text-indigo-400" onClick={() => { setIsJumpOpen(true); setIsFabOpen(false); }} />
                                    <FabItem icon="type" label="Basics" color="text-emerald-500" onClick={() => { setActiveTab('qaida'); setIsFabOpen(false); }} active={activeTab === 'qaida'} />
                                </div>
                            )}
                            <button onClick={() => setIsFabOpen(!isFabOpen)} className="p-5 bg-emerald-600 text-white rounded-full shadow-2xl border border-emerald-500 ring-4 ring-emerald-500/20 active:scale-90 transition-all">
                                <LucideIcon name={isFabOpen ? "x" : "menu"} className="w-6 h-6" />
                            </button>
                        </div>

                        {isJumpOpen && <JumpModal onClose={() => setIsJumpOpen(false)} onSelect={handleSelectVerse} localDatabase={localDatabase} />}
                        {isLowEnergyOpen && <LowEnergyModal context={learningContext} onClose={() => setIsLowEnergyOpen(false)} />}
                    </div>
                </div>
            );
        }

        function SplashScreen() {
            return (
                <div className="fixed inset-0 bg-slate-950 z-[100] flex flex-col items-center justify-center text-center p-6">
                    <p className="text-7xl font-naskh text-amber-500 mb-8 drop-shadow-2xl animate-pulse">بِسْمِ اللَّهِ</p>
                    <h1 className="text-xl font-bold text-white tracking-[0.4em] uppercase opacity-90 mb-4">Hifz Companion</h1>
                    <div className="w-12 h-1 bg-emerald-600 rounded-full animate-pulse"></div>
                </div>
            );
        }

        function FabItem({ icon, label, onClick, color, active }) {
            return (
                <button onClick={onClick} className={`flex items-center gap-3 group transition-opacity ${active ? 'opacity-100' : 'opacity-85 hover:opacity-100'}`}>
                    <span className={`bg-white dark:bg-slate-800 text-[10px] font-black py-1.5 px-3 rounded-lg shadow-md border uppercase tracking-widest ${active ? 'border-emerald-500 text-emerald-500' : 'border-slate-700 text-slate-200'}`}>{label}</span>
                    <div className={`w-12 h-12 rounded-full shadow-lg flex items-center justify-center border active:scale-90 transition-transform ${active ? 'bg-emerald-900 border-emerald-500' : 'bg-white dark:bg-slate-800 border-slate-700'}`}>
                        <LucideIcon name={icon} className={`w-5 h-5 ${color}`} />
                    </div>
                </button>
            );
        }

        function Dashboard({ localDatabase, memorizedAyahs }) {
            const count = Array.isArray(memorizedAyahs) ? memorizedAyahs.length : 0;
            return (
                <div className="space-y-6 animate-in pb-12">
                    <div className="bg-gradient-to-br from-emerald-600 to-emerald-900 p-8 rounded-3xl text-white text-center shadow-xl relative overflow-hidden">
                        <h2 className="text-xs font-medium uppercase tracking-widest opacity-70 mb-4 font-black">Total Progress</h2>
                        <div className="w-44 h-44 mx-auto rounded-full border-8 border-white/20 flex flex-col items-center justify-center relative shadow-inner">
                            <span className="text-5xl font-black">{((count/6236)*100).toFixed(1)}%</span>
                            <span className="text-[10px] uppercase opacity-60 mt-1 font-bold">{count} / 6236 Ayahs</span>
                        </div>
                    </div>
                    <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl border dark:border-slate-700 shadow-sm">
                        <h3 className="font-bold text-xs uppercase tracking-widest opacity-60 mb-4 font-black">Vault Status</h3>
                        <div className="flex justify-between text-xs font-bold mb-2">
                            <span>Offline Chapters</span>
                            <span>{localDatabase?.length || 0} / 114</span>
                        </div>
                        <div className="w-full bg-stone-100 dark:bg-slate-700 h-2 rounded-full overflow-hidden">
                            <div className="bg-emerald-500 h-full transition-all duration-1000" style={{width: `${((localDatabase?.length||0)/114)*100}%`}}></div>
                        </div>
                    </div>
                </div>
            );
        }

        function Qaida({ localDatabase, gender, setGender, engine, setEngine, play }) {
            const [section, setSection] = useState('letters');
            const [level, setLevel] = useState('mixed');
            const [quizWords, setQuizWords] = useState([]);

            const alphabet = [
                {l:"ا", n:"Alif"}, {l:"ب", n:"Baa"}, {l:"ت", n:"Taa"}, {l:"ث", n:"Thaa"},
                {l:"ج", n:"Jeem"}, {l:"ح", n:"Haa"}, {l:"خ", n:"Khaa"}, {l:"د", n:"Daal"},
                {l:"ذ", n:"Thaal"}, {l:"ر", n:"Raa"}, {l:"ز", n:"Zaa"}, {l:"س", n:"Seen"},
                {l:"ش", n:"Sheen"}, {l:"ص", n:"Saad"}, {l:"ض", n:"Dhaad"}, {l:"ط", n:"Taa"},
                {l:"ظ", n:"Zhaa"}, {l:"ع", n:"Ayn"}, {l:"غ", n:"Ghayn"}, {l:"ف", n:"Faa"},
                {l:"ق", n:"Qaaf"}, {l:"ك", n:"Kaaf"}, {l:"ل", n:"Laam"}, {l:"م", n:"Meem"},
                {l:"ن", n:"Noon"}, {l:"ه", n:"Haa"}, {l:"و", n:"Waaw"}, {l:"ي", n:"Yaa"}, {l:"ء", n:"Hamza"}
            ];

            const generateQuiz = () => {
                let raw = ["قُلْ", "رَبِّ", "أَحَدٌ", "الصَّمَدُ", "الْمُسْتَقِيمَ", "الْعَالَمِينَ"];
                localDatabase.forEach(s => s.ayahs?.forEach(a => {
                    if (a.arabic) raw = [...raw, ...a.arabic.split(' ')];
                }));
                const filtered = raw.filter(w => {
                    const clean = w.replace(/[\u064B-\u065F\u0670]/g, '');
                    if (clean.length < 2) return false;
                    if (level === 'short') return clean.length <= 3;
                    if (level === 'medium') return clean.length >= 4 && clean.length <= 5;
                    if (level === 'long') return clean.length >= 6;
                    return true;
                });
                const selected = [...new Set(filtered)].sort(() => 0.5 - Math.random()).slice(0, 6);
                setQuizWords(selected.map(w => ({ text: w, revealed: false })));
            };

            useEffect(() => { if (section === 'words') generateQuiz(); }, [section, level, localDatabase]);

            return (
                <div className="space-y-6 animate-in slide-in-from-right pb-12">
                    <div className="flex bg-white dark:bg-slate-800 p-1 rounded-xl border dark:border-slate-700 shadow-sm">
                        <button onClick={() => setSection('letters')} className={`flex-1 py-2 rounded-lg text-xs font-bold ${section === 'letters' ? 'bg-emerald-600 text-white shadow-md' : 'text-stone-500'}`}>Alphabet</button>
                        <button onClick={() => setSection('words')} className={`flex-1 py-2 rounded-lg text-xs font-bold ${section === 'words' ? 'bg-emerald-600 text-white shadow-md' : 'text-stone-500'}`}>Word Quiz</button>
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                        <div className="bg-white dark:bg-slate-800 p-3 rounded-xl border dark:border-slate-700 text-center shadow-sm">
                            <p className="text-[10px] font-bold text-stone-400 mb-2 uppercase tracking-widest font-black">Voice</p>
                            <div className="flex bg-stone-100 dark:bg-slate-900 p-1 rounded-lg shadow-inner">
                                <button onClick={() => setGender('male')} className={`flex-1 py-1 text-xs font-bold rounded-md transition-all ${gender === 'male' ? 'bg-white dark:bg-slate-700 text-emerald-500 shadow-sm' : 'text-stone-400'}`}>Male</button>
                                <button onClick={() => setGender('female')} className={`flex-1 py-1 text-xs font-bold rounded-md transition-all ${gender === 'female' ? 'bg-white dark:bg-slate-700 text-emerald-500 shadow-sm' : 'text-stone-400'}`}>Female</button>
                            </div>
                        </div>
                        <div className="bg-white dark:bg-slate-800 p-3 rounded-xl border dark:border-slate-700 text-center shadow-sm">
                            <p className="text-[10px] font-bold text-stone-400 mb-2 uppercase tracking-widest font-black">Engine</p>
                            <div className="flex bg-stone-100 dark:bg-slate-900 p-1 rounded-lg shadow-inner">
                                <button onClick={() => setEngine('local')} className={`flex-1 py-1 text-xs font-bold rounded-md transition-all ${engine === 'local' ? 'bg-white dark:bg-slate-700 text-emerald-500 shadow-sm' : 'text-stone-400'}`}>Local</button>
                                <button onClick={() => setEngine('cloud')} className={`flex-1 py-1 text-xs font-bold rounded-md transition-all ${engine === 'cloud' ? 'bg-white dark:bg-slate-700 text-emerald-500 shadow-sm' : 'text-stone-400'}`}>Cloud</button>
                            </div>
                        </div>
                    </div>

                    {section === 'letters' && (
                        <div className="grid grid-cols-3 gap-3 bg-white dark:bg-slate-800 p-4 rounded-2xl border dark:border-slate-700 shadow-sm">
                            {alphabet.map((item, i) => (
                                <button key={i} onClick={() => play(item.l)} className="aspect-square rounded-xl border bg-stone-50 dark:bg-slate-900 dark:border-slate-700 flex flex-col items-center justify-center active:scale-95 transition-all shadow-sm">
                                    <span className="text-4xl font-naskh mb-1 leading-none">{item.l}</span>
                                    <span className="text-[10px] font-bold text-stone-400 uppercase tracking-tighter">{item.n}</span>
                                </button>
                            ))}
                        </div>
                    )}

                    {section === 'words' && (
                        <div className="space-y-6">
                            <div className="flex bg-white dark:bg-slate-800 p-1 rounded-xl border dark:border-slate-700 shadow-inner">
                                {['short', 'medium', 'long', 'mixed'].map(l => (
                                    <button key={l} onClick={() => setLevel(l)} className={`flex-1 py-2 rounded-lg text-[10px] font-bold uppercase transition-all ${level === l ? 'bg-emerald-600 text-white shadow-md' : 'text-stone-400'}`}>{l}</button>
                                ))}
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                {quizWords.map((w, i) => (
                                    <div key={i} onClick={() => setQuizWords(prev => prev.map((item, idx) => idx === i ? {...item, revealed: true} : item))} className="quiz-card relative rounded-3xl border-2 dark:border-slate-700 bg-white dark:bg-slate-800 flex flex-col items-center justify-center shadow-lg active:scale-95 transition-all overflow-hidden p-4 text-center">
                                        {!w.revealed ? (
                                            <div><LucideIcon name="eye-off" className="mx-auto mb-2 text-slate-400"/><span className="text-[10px] font-bold uppercase text-slate-400 tracking-widest">Reveal</span></div>
                                        ) : (
                                            <div className="animate-in fade-in flex flex-col items-center">
                                                <span className="text-4xl font-naskh mb-4">{w.text}</span>
                                                <button onClick={(e) => { e.stopPropagation(); play(w.text); }} className="p-3 bg-emerald-500 text-white rounded-full shadow-lg active:scale-90"><LucideIcon name="volume-2"/></button>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                            <button onClick={generateQuiz} className="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black uppercase tracking-widest flex items-center justify-center gap-2 shadow-xl active:scale-95 transition-all"><LucideIcon name="refresh-cw"/> New Round</button>
                        </div>
                    )}
                </div>
            );
        }

        function Explorer({ localDatabase, setLocalDatabase, selectedSurah, setSelectedSurah, librarySurahData, setLibrarySurahData, onSelectVerse, playNative }) {
            const [menu, setMenu] = useState(null);
            const fileRef = useRef(null);

            const loadSurah = (id) => {
                const info = SURAHS_META.find(s => s.id === id);
                const vaultEntry = (localDatabase || []).find(s => s.id === id);
                if (id === 1 && !vaultEntry) {
                    setSelectedSurah({...info, ayahs: FATIHAH_BUILTIN});
                    setLibrarySurahData(FATIHAH_BUILTIN);
                    return;
                }
                if (!vaultEntry) { alert("Chapter not in vault. Upload JSON."); return; }
                setSelectedSurah({...info, ...vaultEntry});
                setLibrarySurahData(vaultEntry.ayahs || []);
            };

            const upload = async (e) => {
                const files = Array.from(e.target.files);
                let news = [];
                for (const f of files) {
                    try { const t = await f.text(); const d = JSON.parse(t); if(Array.isArray(d)) news = [...news, ...d]; } catch(err){}
                }
                if(news.length > 0) {
                    setLocalDatabase(prev => {
                        const merged = [...(prev || [])];
                        news.forEach(ns => { const i = merged.findIndex(s => s.id === ns.id); if(i>=0) merged[i]=ns; else merged.push(ns); });
                        localStorage.setItem('hifz_vault_v170', JSON.stringify(merged));
                        return merged;
                    });
                }
                e.target.value = null;
            };

            if (selectedSurah) {
                return (
                    <div className="space-y-6 animate-in fade-in pb-12" onClick={() => setMenu(null)}>
                        <button onClick={() => onSelectVerse(librarySurahData[0], librarySurahData, 0, selectedSurah)} className="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-transform"><LucideIcon name="play" className="w-5 h-5 fill-current"/> Start Memorizing</button>
                        <div className="text-center space-y-4">
                            <h2 className="text-2xl font-bold">{selectedSurah.name}</h2>
                            {selectedSurah.intro && <div className="p-5 bg-emerald-950/20 border border-emerald-900/40 rounded-2xl text-left text-sm leading-relaxed text-emerald-300 italic"><LucideIcon name="info" className="w-4 h-4 mb-2 inline-block mr-2 text-emerald-500"/>{selectedSurah.intro}</div>}
                        </div>
                        {librarySurahData.map((v, i) => (
                            <div key={i} className="p-5 bg-white dark:bg-slate-800 rounded-2xl border dark:border-slate-700 shadow-sm relative no-select">
                                <div className="absolute top-3 right-3 flex gap-2">
                                    <button onClick={(e) => { e.stopPropagation(); playNative(v.arabic, selectedSurah.id, v.ayah); }} className="p-1 text-emerald-500 border rounded-lg dark:border-slate-700 active:scale-90 transition-all"><LucideIcon name="volume-2" className="w-5 h-5"/></button>
                                    <button onClick={(e) => { e.stopPropagation(); setMenu(menu === i ? null : i); }} className="p-1 text-stone-400 border rounded-lg dark:border-slate-700 transition-all active:scale-90"><LucideIcon name="more-horizontal" className="w-5 h-5"/></button>
                                    {menu === i && <div className="absolute top-8 right-0 bg-white dark:bg-slate-800 border dark:border-slate-700 shadow-xl rounded-lg p-2 z-10 w-48 animate-in" onClick={e=>e.stopPropagation()}><button onClick={() => {onSelectVerse(v, librarySurahData, i, selectedSurah); setMenu(null);}} className="flex items-center gap-2 px-3 py-2 text-sm font-bold text-emerald-400 w-full text-left rounded-md hover:bg-slate-700 transition-colors"><LucideIcon name="target" className="w-4 h-4"/> Focus Ayah</button></div>}
                                </div>
                                <div className="absolute -left-2 -top-2 w-8 h-8 rounded-full bg-emerald-900 text-emerald-300 flex items-center justify-center font-bold text-xs border border-emerald-700 shadow-sm">{v.ayah}</div>
                                <p className="text-4xl font-naskh text-right mb-4 mt-2 leading-relaxed" dir="rtl">{v.arabic}</p>
                                <div className="p-3 bg-slate-900/50 rounded-lg border border-slate-700 text-[11px] text-emerald-400 italic mb-3 leading-snug">{v.transliteration}</div>
                                <p className="text-sm text-slate-300 mb-3 leading-relaxed">"{v.english}"</p>
                                {v.tafsir && <div className="p-4 bg-amber-900/10 rounded-xl text-[11px] text-slate-400 border border-amber-900/30 leading-relaxed italic">{v.tafsir}</div>}
                            </div>
                        ))}
                    </div>
                );
            }

            return (
                <div className="space-y-4">
                    <div className="p-5 bg-white dark:bg-slate-800 rounded-2xl border dark:border-slate-700 flex justify-between items-center shadow-sm">
                        <h3 className="font-bold text-xs uppercase tracking-widest opacity-60 font-black">Vault Manager</h3>
                        <div className="flex gap-2">
                           <input type="file" multiple ref={fileRef} onChange={upload} className="hidden" />
                           <button onClick={() => fileRef.current?.click()} className="px-3 py-2 bg-emerald-900/40 text-emerald-300 rounded-lg font-bold text-xs flex items-center gap-1 uppercase tracking-wider active:scale-95 shadow-inner"><LucideIcon name="plus" className="w-3 h-3"/> Add Pack</button>
                        </div>
                    </div>
                    <div className="space-y-2 pb-12">
                        {SURAHS_META.map(s => (
                            <div key={s.id} onClick={() => loadSurah(s.id)} className="p-4 bg-white dark:bg-slate-800 rounded-xl border dark:border-slate-700 flex justify-between items-center shadow-sm hover:border-emerald-500 cursor-pointer active:bg-slate-700/50 transition-colors">
                                <div><p className="font-bold">{s.id}. {s.name}</p><p className="text-xs text-stone-500 uppercase tracking-tighter">{s.english}</p></div>
                                <div className="flex gap-2">
                                    {((localDatabase || []).some(ls => ls.id === s.id) || s.id === 1) && <LucideIcon name="check-circle-2" className="w-4 h-4 text-emerald-500" />}
                                    <LucideIcon name="chevron-right" className="w-5 h-5 text-stone-300" />
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function Memorize({ context, setContext, logMemorized, memorizedList, playNative }) {
            const [step, setStep] = useState(1);
            const [reps, setReps] = useState(0);
            const steps = [{id:1, t:"Review", target:1}, {id:2, t:"Listen", target:5}, {id:3, t:"Repeat", target:10}, {id:4, t:"Test", target:5}];
            
            useEffect(() => { if(context) {setStep(1); setReps(0);} }, [context?.verse?.ayah, context?.surahInfo?.id]);

            const logAction = () => {
                const target = steps[step-1].target;
                if (step === 2) playNative(context.verse.arabic, context.surahInfo.id, context.verse.ayah);
                if (reps + 1 >= target) {
                    if (step < 4) { setStep(step + 1); setReps(0); }
                    else setReps(target);
                } else setReps(reps + 1);
            };

            const finalize = () => {
                logMemorized(context.surahInfo.id, context.verse.ayah);
                if (context.currentIndex < context.surahData.length - 1) {
                    const nIdx = context.currentIndex + 1;
                    setContext({...context, currentIndex: nIdx, verse: context.surahData[nIdx]});
                }
            };

            if (!context) return <div className="py-20 text-center text-stone-500">Pick a Surah from the Library.</div>;

            return (
                <div className="space-y-4 animate-in no-select pb-24">
                    <div className="flex items-center justify-between bg-white dark:bg-slate-800 p-3 rounded-xl border dark:border-slate-700 shadow-sm shrink-0">
                        <button disabled={context.currentIndex === 0} onClick={() => { const i = context.currentIndex - 1; setContext({...context, currentIndex: i, verse: context.surahData[i]}) }} className="p-2 text-stone-400 disabled:opacity-20 active:scale-90"><LucideIcon name="chevron-left"/></button>
                        <h2 className="text-sm font-bold opacity-60 uppercase tracking-widest text-center truncate px-2">Surah {context.surahInfo.name} • {context.verse.ayah}</h2>
                        <button disabled={context.currentIndex === context.surahData.length - 1} onClick={() => { const i = context.currentIndex + 1; setContext({...context, currentIndex: i, verse: context.surahData[i]}) }} className="p-2 text-stone-400 disabled:opacity-20 active:scale-90"><LucideIcon name="chevron-right"/></button>
                    </div>
                    
                    <div className="verse-card p-6 bg-white dark:bg-slate-800 rounded-3xl border dark:border-slate-700 shadow-lg relative ring-4 ring-emerald-500/5">
                        <button onClick={() => playNative(context.verse.arabic, context.surahInfo.id, context.verse.ayah)} className="absolute top-4 right-4 p-2 bg-emerald-50 dark:bg-emerald-950 rounded-full text-emerald-600 active:scale-90 shadow-sm"><LucideIcon name="volume-2"/></button>
                        <div className="verse-text-scroll mt-8">
                            <p className="text-4xl font-naskh leading-relaxed mb-6" dir="rtl">{context.verse.arabic}</p>
                            <div className="space-y-4">
                                <p className="text-emerald-500 italic text-sm leading-snug font-medium">{context.verse.transliteration}</p>
                                <p className="text-sm dark:text-slate-300 leading-snug">"{context.verse.english}"</p>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-4 gap-2">
                        {steps.map(s => (
                            <div key={s.id} className={`py-2 text-[10px] font-bold text-center rounded-lg border transition-all ${step === s.id ? 'bg-emerald-600 text-white border-emerald-500 shadow-md scale-105' : 'bg-slate-800 opacity-40 border-slate-700'}`}>{s.t}</div>
                        ))}
                    </div>
                    <div className="flex gap-4">
                        <div className="flex-1 bg-white dark:bg-slate-800 rounded-2xl border dark:border-slate-700 flex items-center justify-center text-2xl font-black shadow-inner">{reps}/{steps[step-1].target}</div>
                        <button onClick={logAction} className="flex-[3] py-6 bg-emerald-600 text-white rounded-2xl font-bold shadow-xl active:scale-95 transition-all text-lg border border-emerald-500 uppercase tracking-widest font-black">{step === 2 ? 'Play & Log' : 'Log Rep'}</button>
                    </div>
                    {step === 4 && reps >= steps[3].target && <button onClick={finalize} className="w-full py-5 bg-emerald-800 text-white rounded-2xl font-bold animate-bounce shadow-2xl flex items-center justify-center gap-2 transition-all font-black uppercase tracking-widest"><LucideIcon name="check-circle-2"/> Save Ayah & Next</button>}
                </div>
            );
        }

        function JumpModal({ onClose, onSelect, localDatabase }) {
            const [s, setS] = useState('');
            const [a, setA] = useState('');
            const handle = () => {
                const sId = parseInt(s); const aId = parseInt(a);
                const info = SURAHS_META.find(item => item.id === sId);
                let vs = (localDatabase || []).find(item => item.id === sId)?.ayahs;
                if (!vs && sId === 1) vs = FATIHAH_BUILTIN;
                if (!vs) { alert("Chapter not in vault."); return; }
                const targetIdx = vs.findIndex(v => v.ayah === aId);
                if (targetIdx >= 0) onSelect(vs[targetIdx], vs, targetIdx, {id: sId, name: info?.name || `Surah ${sId}`});
                else alert("Ayah not found.");
            };
            return (
                <div className="fixed inset-0 bg-black/70 z-[80] flex items-center justify-center p-4 backdrop-blur-sm animate-in" onClick={onClose}>
                    <div className="bg-white dark:bg-slate-800 rounded-3xl p-6 w-full max-w-sm border dark:border-slate-700 shadow-2xl" onClick={e=>e.stopPropagation()}>
                        <h3 className="text-xl font-bold mb-6 text-center uppercase tracking-widest opacity-60 font-black">Jump to Ayah</h3>
                        <div className="space-y-4 mb-8">
                            <input type="number" placeholder="Surah Number" value={s} onChange={e=>setS(e.target.value)} className="w-full bg-stone-100 dark:bg-slate-900 rounded-xl p-4 outline-none border border-transparent focus:border-emerald-500 text-lg dark:text-white shadow-inner" />
                            <input type="number" placeholder="Ayah Number" value={a} onChange={e=>setA(e.target.value)} className="w-full bg-stone-100 dark:bg-slate-900 rounded-xl p-4 outline-none border border-transparent focus:border-emerald-500 text-lg dark:text-white shadow-inner" />
                        </div>
                        <div className="flex gap-3">
                            <button onClick={onClose} className="flex-1 py-4 font-bold bg-stone-100 dark:bg-slate-700 rounded-xl uppercase tracking-widest text-xs">Cancel</button>
                            <button onClick={handle} className="flex-1 py-4 font-bold bg-emerald-600 text-white rounded-xl shadow-lg uppercase tracking-widest text-xs active:scale-95 transition-transform">Go</button>
                        </div>
                    </div>
                </div>
            );
        }

        function LowEnergyModal({ context, onClose }) {
            const [t, setT] = useState(300);
            const [active, setActive] = useState(false);
            useEffect(() => { let i; if(active && t > 0) i = setInterval(() => setT(v => v - 1), 1000); return () => clearInterval(i); }, [active, t]);
            return (
                <div className="fixed inset-x-0 bottom-0 z-[80] animate-in slide-in-from-bottom">
                    <div className="absolute inset-0 bg-black/50 -top-[100vh] backdrop-blur-sm" onClick={onClose}></div>
                    <div className="bg-slate-950 p-6 rounded-t-3xl border-t border-slate-800 relative shadow-2xl text-center">
                        <h2 className="text-2xl font-bold uppercase mb-2 tracking-widest text-amber-500 font-black">Low Energy</h2>
                        <div className="bg-slate-900 p-8 rounded-2xl mb-6 flex justify-between items-center shadow-inner text-amber-400 font-mono text-5xl tracking-widest font-black">
                            {Math.floor(t/60)}:{(t%60).toString().padStart(2,'0')}
                            <button onClick={() => setActive(!active)} className="w-16 h-16 bg-amber-600 text-white rounded-full flex items-center justify-center active:scale-90 transition-transform shadow-lg">{active ? <LucideIcon name="pause" /> : <LucideIcon name="play" />}</button>
                        </div>
                        <div className="p-4 bg-slate-900 rounded-xl border border-slate-800"><p className="text-4xl font-naskh text-center leading-relaxed" dir="rtl">{context?.verse?.arabic}</p></div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

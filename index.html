<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hifz Companion</title>
    <!-- React, Babel, and Tailwind CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .font-naskh { font-family: 'Amiri', serif; line-height: 2.2; }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        button:active { transform: scale(0.95); }
        .tab-active { color: #10b981; border-top: 2px solid #10b981; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Icon component that ensures Lucide icons render correctly
        const LucideIcon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const SURAHS = [
            { id: 1, name: "Al-Fatihah", english: "The Opener", phase: "Phase 1" },
            { id: 67, name: "Al-Mulk", english: "The Sovereignty", phase: "Phase 2" },
            { id: 78, name: "An-Naba", english: "The Tidings", phase: "Phase 1" },
            { id: 79, name: "An-Nazi'at", english: "Those who drag forth", phase: "Phase 1" },
            { id: 80, name: "'Abasa", english: "He Frowned", phase: "Phase 1" },
            { id: 81, name: "At-Takwir", english: "The Overthrowing", phase: "Phase 1" },
            { id: 82, name: "Al-Infitar", english: "The Cleaving", phase: "Phase 1" },
            { id: 83, name: "Al-Mutaffifin", english: "The Defrauding", phase: "Phase 1" },
            { id: 84, name: "Al-Inshiqaq", english: "The Sundering", phase: "Phase 1" },
            { id: 85, name: "Al-Buruj", english: "The Mansions", phase: "Phase 1" },
            { id: 86, name: "At-Tariq", english: "The Nightcommer", phase: "Phase 1" },
            { id: 87, name: "Al-A'la", english: "The Most High", phase: "Phase 1" },
            { id: 88, name: "Al-Ghashiyah", english: "The Overwhelming", phase: "Phase 1" },
            { id: 89, name: "Al-Fajr", english: "The Dawn", phase: "Phase 1" },
            { id: 90, name: "Al-Balad", english: "The City", phase: "Phase 1" },
            { id: 91, name: "Ash-Shams", english: "The Sun", phase: "Phase 1" },
            { id: 92, name: "Al-Layl", english: "The Night", phase: "Phase 1" },
            { id: 93, name: "Ad-Duhaa", english: "The Morning Hours", phase: "Phase 1" },
            { id: 94, name: "Ash-Sharh", english: "The Relief", phase: "Phase 1" },
            { id: 95, name: "At-Tin", english: "The Fig", phase: "Phase 1" },
            { id: 96, name: "Al-'Alaq", english: "The Clot", phase: "Phase 1" },
            { id: 97, name: "Al-Qadr", english: "The Power", phase: "Phase 1" },
            { id: 98, name: "Al-Bayyinah", english: "The Clear Proof", phase: "Phase 1" },
            { id: 99, name: "Az-Zalzalah", english: "The Earthquake", phase: "Phase 1" },
            { id: 100, name: "Al-'Adiyat", english: "The Courser", phase: "Phase 1" },
            { id: 101, name: "Al-Qari'ah", english: "The Calamity", phase: "Phase 1" },
            { id: 102, name: "At-Takathur", english: "Worldly Increase", phase: "Phase 1" },
            { id: 103, name: "Al-'Asr", english: "The Declining Day", phase: "Phase 1" },
            { id: 104, name: "Al-Humazah", english: "The Traducer", phase: "Phase 1" },
            { id: 105, name: "Al-Fil", english: "The Elephant", phase: "Phase 1" },
            { id: 106, name: "Quraysh", english: "Quraysh", phase: "Phase 1" },
            { id: 107, name: "Al-Ma'un", english: "Small Kindnesses", phase: "Phase 1" },
            { id: 108, name: "Al-Kawthar", english: "Abundance", phase: "Phase 1" },
            { id: 109, name: "Al-Kafirun", english: "The Disbelievers", phase: "Phase 1" },
            { id: 110, name: "An-Nasr", english: "Divine Support", phase: "Phase 1" },
            { id: 111, name: "Al-Masad", english: "The Palm Fiber", phase: "Phase 1" },
            { id: 112, name: "Al-Ikhlas", english: "The Sincerity", phase: "Phase 1" },
            { id: 113, name: "Al-Falaq", english: "The Daybreak", phase: "Phase 1" },
            { id: 114, name: "An-Nas", english: "Mankind", phase: "Phase 1" }
        ];

        const OFFLINE_PACK = {
            "1": [
                { ayah: 1, arabic: "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", transliteration: "Bismillaahir Rahmaanir Raheem", english: "In the name of Allah, the Entirely Merciful, the Especially Merciful.", tafsir: "Invoke His mercy. This journey is fueled by His grace." },
                { ayah: 2, arabic: "الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ", transliteration: "Alhamdu lillaahi Rabbil 'aalameen", english: "[All] praise is [due] to Allah, Lord of the worlds -", tafsir: "Gratitude for the past and present." },
                { ayah: 3, arabic: "الرَّحْمَٰنِ الرَّحِيمِ", transliteration: "Ar-Rahmaanir-Raheem", english: "The Entirely Merciful, the Especially Merciful,", tafsir: "Repeated for emphasis." },
                { ayah: 4, arabic: "مَالِكِ يَوْمِ الدِّينِ", transliteration: "Maaliki Yawmid-Deen", english: "Sovereign of the Day of Recompense.", tafsir: "Ultimate accountability." },
                { ayah: 5, arabic: "إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ", transliteration: "Iyyaaka na'budu wa lyyaaka nasta'een", english: "It is You we worship and You we ask for help.", tafsir: "Total dependence." },
                { ayah: 6, arabic: "اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ", transliteration: "Ihdinas-Siraatal-Mustaqeem", english: "Guide us to the straight path -", tafsir: "Daily requirement for direction." },
                { ayah: 7, arabic: "صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ", transliteration: "Siraatal-lazeena an'amta 'alaihim ghayril-maghdoobi 'alaihim wa lad-daaalleen", english: "The path of those upon whom You have bestowed favor...", tafsir: "The path of the Prophets." }
            ]
        };

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [theme, setTheme] = useState('dark');
            const [isFabOpen, setIsFabOpen] = useState(false);
            const [localDatabase, setLocalDatabase] = useState([]);
            const [memorizedAyahs, setMemorizedAyahs] = useState([]);
            const [selectedSurahForView, setSelectedSurahForView] = useState(null);
            const [librarySurahData, setLibrarySurahData] = useState([]);
            const [isLibraryLoading, setIsLibraryLoading] = useState(false);
            const [isJumpModalOpen, setIsJumpModalOpen] = useState(false);
            const [isLowEnergyOpen, setIsLowEnergyOpen] = useState(false);
            const [learningContext, setLearningContext] = useState({ 
                surahInfo: SURAHS[0], verse: OFFLINE_PACK["1"][0], surahData: OFFLINE_PACK["1"], currentIndex: 0 
            });

            useEffect(() => {
                const savedVault = localStorage.getItem('hifz_vault_gh_v3');
                if (savedVault) setLocalDatabase(JSON.parse(savedVault));
                const savedProgress = localStorage.getItem('hifz_progress_gh_v3');
                if (savedProgress) setMemorizedAyahs(JSON.parse(savedProgress));
            }, []);

            const handleSelectVerse = (verse, surahData, index, surahInfo) => {
                setLearningContext({ verse, surahData, currentIndex: index, surahInfo });
                setActiveTab('memorize');
                setIsJumpModalOpen(false);
                setIsFabOpen(false);
            };

            const handleSmartBack = () => {
                if (activeTab === 'memorize') setActiveTab('explorer');
                else if (activeTab === 'explorer' && selectedSurahForView) { setSelectedSurahForView(null); setLibrarySurahData([]); }
                else if (activeTab === 'qaida') setActiveTab('dashboard');
            };

            return (
                <div className={`${theme === 'dark' ? 'dark' : ''} min-h-screen transition-colors duration-300`}>
                    <div className="min-h-screen bg-stone-50 dark:bg-slate-900 text-stone-800 dark:text-slate-100 font-sans pb-24 relative overflow-x-hidden">
                        
                        <header className="bg-emerald-800 dark:bg-slate-950 text-stone-50 p-4 shadow-xl sticky top-0 z-30">
                            <h1 className="text-xl font-bold tracking-tight uppercase text-center">Hifz Companion</h1>
                        </header>

                        <main className="max-w-md mx-auto p-4 pt-6">
                            {activeTab === 'dashboard' && <Dashboard localDatabase={localDatabase} memorizedAyahs={memorizedAyahs} />}
                            {activeTab === 'qaida' && <Qaida localDatabase={localDatabase} />}
                            {activeTab === 'explorer' && <Explorer 
                                localDatabase={localDatabase} 
                                setLocalDatabase={setLocalDatabase}
                                selectedSurahForView={selectedSurahForView}
                                setSelectedSurahForView={setSelectedSurahForView}
                                librarySurahData={librarySurahData}
                                setLibrarySurahData={setLibrarySurahData}
                                loading={isLibraryLoading}
                                setLoading={setIsLibraryLoading}
                                onSelectVerse={handleSelectVerse}
                            />}
                            {activeTab === 'memorize' && <Memorize context={learningContext} setContext={setLearningContext} memorizedAyahs={memorizedAyahs} setMemorizedAyahs={setMemorizedAyahs}/>}
                        </main>

                        {/* NAV BACK BUTTON */}
                        {(activeTab === 'qaida' || (activeTab === 'explorer' && selectedSurahForView) || activeTab === 'memorize') && (
                            <button onClick={handleSmartBack} className="fixed bottom-24 left-4 p-4 bg-stone-800 text-white rounded-full shadow-lg border border-stone-700 z-50">
                                <LucideIcon name="arrow-left" />
                            </button>
                        )}

                        {/* EXPANDING FAB BACKDROP */}
                        {isFabOpen && <div className="fixed inset-0 bg-black/40 z-40 animate-in" onClick={() => setIsFabOpen(false)}></div>}

                        {/* EXPANDING FAB */}
                        <div className="fixed bottom-24 right-4 flex flex-col items-end gap-3 z-50">
                            {isFabOpen && (
                                <div className="flex flex-col items-end gap-3 mb-2">
                                    <FabActionItem icon="battery-low" label="Low Energy" color="text-amber-500" onClick={() => { setIsLowEnergyOpen(true); setIsFabOpen(false); }} />
                                    <FabActionItem icon="search" label="Teleport" color="text-blue-400" onClick={() => { setIsJumpModalOpen(true); setIsFabOpen(false); }} />
                                    <FabActionItem icon="type" label="Basics" color="text-emerald-500" onClick={() => { setActiveTab('qaida'); setIsFabOpen(false); }} />
                                    <FabActionItem icon={theme === 'dark' ? "sun" : "moon"} label="Theme" color="text-slate-400" onClick={() => { setTheme(theme === 'dark' ? 'light' : 'dark'); setIsFabOpen(false); }} />
                                </div>
                            )}
                            <button onClick={() => setIsFabOpen(!isFabOpen)} className="p-4 bg-emerald-600 text-white rounded-full shadow-2xl border border-emerald-500 transition-transform">
                                <LucideIcon name={isFabOpen ? "x" : "menu"} />
                            </button>
                        </div>

                        <nav className="fixed bottom-0 w-full bg-white dark:bg-slate-950 border-t border-stone-200 dark:border-slate-800 flex justify-around items-center h-16 z-40">
                            <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center gap-1 ${activeTab === 'dashboard' ? 'text-emerald-500' : 'text-stone-400'}`}>
                                <LucideIcon name="home" />
                                <span className="text-[10px] font-bold uppercase">Home</span>
                            </button>
                            <button onClick={() => { setActiveTab('explorer'); setSelectedSurahForView(null); }} className={`flex flex-col items-center gap-1 ${activeTab === 'explorer' ? 'text-emerald-500' : 'text-stone-400'}`}>
                                <LucideIcon name="book" />
                                <span className="text-[10px] font-bold uppercase">Library</span>
                            </button>
                            <button onClick={() => setActiveTab('memorize')} className={`flex flex-col items-center gap-1 ${activeTab === 'memorize' ? 'text-emerald-500' : 'text-stone-400'}`}>
                                <LucideIcon name="target" />
                                <span className="text-[10px] font-bold uppercase">Learn</span>
                            </button>
                        </nav>

                        {isJumpModalOpen && <JumpModal onClose={() => setIsJumpModalOpen(false)} onSelect={handleSelectVerse} localDatabase={localDatabase} />}
                        {isLowEnergyOpen && <LowEnergyModal context={learningContext} onClose={() => setIsLowEnergyOpen(false)} />}
                    </div>
                </div>
            );
        }

        function FabActionItem({ icon, label, onClick, color }) {
            return (
                <button onClick={onClick} className="flex items-center gap-3">
                    <span className="bg-white dark:bg-slate-800 text-stone-800 dark:text-slate-200 text-[10px] font-bold py-1.5 px-3 rounded-lg shadow-md border dark:border-slate-700 uppercase tracking-tighter">{label}</span>
                    <div className="w-12 h-12 bg-white dark:bg-slate-800 rounded-full shadow-lg flex items-center justify-center border dark:border-slate-700">
                        <LucideIcon name={icon} className={`w-5 h-5 ${color}`} />
                    </div>
                </button>
            );
        }

        function Dashboard({ localDatabase, memorizedAyahs }) {
            const stats = ((memorizedAyahs.length / 6236) * 100).toFixed(1);
            return (
                <div className="space-y-6 animate-in">
                    <div className="bg-gradient-to-br from-emerald-600 to-emerald-900 p-8 rounded-3xl text-white text-center shadow-xl relative overflow-hidden">
                        <h2 className="text-sm font-medium uppercase tracking-widest opacity-80 mb-4">Total Progress</h2>
                        <div className="w-44 h-44 mx-auto rounded-full border-8 border-white/20 flex flex-col items-center justify-center">
                            <span className="text-5xl font-black">{stats}%</span>
                            <span className="text-[10px] opacity-60 uppercase mt-1">Memorized</span>
                        </div>
                    </div>
                    <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl border dark:border-slate-700 shadow-sm">
                        <h3 className="font-bold mb-4 flex items-center gap-2 uppercase text-xs tracking-widest opacity-60">Offline Vault</h3>
                        <div className="flex justify-between text-xs font-bold text-stone-500 uppercase mb-2">
                            <span>Downloaded Packs</span>
                            <span>{localDatabase.length} / 114</span>
                        </div>
                        <div className="w-full bg-stone-100 dark:bg-slate-700 h-2 rounded-full overflow-hidden">
                            <div className="bg-emerald-500 h-full" style={{width: `${(localDatabase.length/114)*100}%`}}></div>
                        </div>
                    </div>
                </div>
            );
        }

        function Qaida({ localDatabase }) {
            const [section, setSection] = useState('letters');
            const [gender, setGender] = useState('male');
            const [source, setSource] = useState('local');
            const [len, setLen] = useState('mixed');
            const [playingId, setPlayingId] = useState(null);
            const [dynamicWords, setDynamicWords] = useState([]);
            const alphabet = "ابتثجحخدذرزسشصضطظعغفقكلمنهويء".split("");

            const playAudio = (txt, id) => {
                setPlayingId(id);
                const isCloud = source === 'cloud';
                
                const playDirect = () => {
                    if (isCloud) {
                        const audio = new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&tl=ar&client=tw-ob&q=${encodeURIComponent(txt)}`);
                        if (gender === 'male') { audio.playbackRate = 0.9; if ('preservesPitch' in audio) audio.preservesPitch = false; }
                        audio.onended = () => setPlayingId(null);
                        audio.play().catch(() => setPlayingId(null));
                    } else {
                        window.speechSynthesis.cancel();
                        const u = new SpeechSynthesisUtterance(txt);
                        u.lang = 'ar-SA';
                        const vList = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('ar'));
                        if (vList.length > 0) {
                            const maleNames = ['tariq', 'maged', 'hamid'];
                            const femaleNames = ['laila', 'hoda', 'salma'];
                            u.voice = gender === 'male' ? 
                                (vList.find(v => maleNames.some(n => v.name.toLowerCase().includes(n))) || vList[0]) :
                                (vList.find(v => femaleNames.some(n => v.name.toLowerCase().includes(n))) || vList[vList.length-1]);
                            u.pitch = gender === 'male' ? 0.9 : 1.1;
                            u.rate = 1.0;
                            u.onend = () => setPlayingId(null);
                            window.speechSynthesis.speak(u);
                        } else {
                            // Fallback to cloud MP3 if no local voices
                            const audio = new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&tl=ar&client=tw-ob&q=${encodeURIComponent(txt)}`);
                            audio.onended = () => setPlayingId(null);
                            audio.play();
                        }
                    }
                };
                playDirect();
            };

            useEffect(() => {
                if (section !== 'words') return;
                const baseline = ["قُلْ", "رَبِّ", "أَحَدٌ", "الصَّمَدُ", "الْمُسْتَقِيمَ", "الْعَالَمِينَ"];
                let raw = [...baseline];
                const sourceData = (localDatabase && localDatabase.length > 0) ? localDatabase : [{ayahs: OFFLINE_PACK["1"]}];
                sourceData.forEach(s => s?.ayahs?.forEach(a => a.arabic && (raw = [...raw, ...a.arabic.split(' ')])));
                const filtered = raw.filter(w => {
                    const cleanLen = w.replace(/[\u064B-\u065F\u0670]/g, '').length;
                    if (len === 'short') return cleanLen <= 3;
                    if (len === 'medium') return cleanLen >= 4 && cleanLen <= 5;
                    if (len === 'long') return cleanLen >= 6;
                    return true;
                });
                setDynamicWords([...new Set(filtered)].sort(() => 0.5 - Math.random()).slice(0, 6));
            }, [section, len, localDatabase]);

            return (
                <div className="space-y-6 animate-in slide-in-from-right">
                    <div className="flex bg-white dark:bg-slate-800 p-1 rounded-xl border dark:border-slate-700 shadow-sm">
                        <button onClick={() => setSection('letters')} className={`flex-1 py-2 rounded-lg text-xs font-bold ${section === 'letters' ? 'bg-emerald-600 text-white shadow-md' : ''}`}>Alphabet</button>
                        <button onClick={() => setSection('words')} className={`flex-1 py-2 rounded-lg text-xs font-bold ${section === 'words' ? 'bg-emerald-600 text-white shadow-md' : ''}`}>Words</button>
                        <button onClick={() => setSection('rules')} className={`flex-1 py-2 rounded-lg text-xs font-bold ${section === 'rules' ? 'bg-emerald-600 text-white shadow-md' : ''}`}>Rules</button>
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                        <div className="bg-white dark:bg-slate-800 p-3 rounded-xl border dark:border-slate-700">
                            <p className="text-[10px] font-bold text-stone-400 mb-2 uppercase text-center tracking-widest">Voice Gender</p>
                            <div className="flex bg-stone-100 dark:bg-slate-900 p-1 rounded-lg">
                                <button onClick={() => setGender('male')} className={`flex-1 py-1 text-[10px] font-bold rounded-md ${gender === 'male' ? 'bg-white dark:bg-slate-700 text-emerald-500 shadow-sm' : 'text-stone-400'}`}>Male</button>
                                <button onClick={() => setGender('female')} className={`flex-1 py-1 text-[10px] font-bold rounded-md ${gender === 'female' ? 'bg-white dark:bg-slate-700 text-emerald-500 shadow-sm' : 'text-stone-400'}`}>Female</button>
                            </div>
                        </div>
                        <div className="bg-white dark:bg-slate-800 p-3 rounded-xl border dark:border-slate-700">
                            <p className="text-[10px] font-bold text-stone-400 mb-2 uppercase text-center tracking-widest">Audio Source</p>
                            <div className="flex bg-stone-100 dark:bg-slate-900 p-1 rounded-lg">
                                <button onClick={() => setSource('local')} className={`flex-1 py-1 text-[10px] font-bold rounded-md ${source === 'local' ? 'bg-white dark:bg-slate-700 text-emerald-500 shadow-sm' : 'text-stone-400'}`}>Local</button>
                                <button onClick={() => setSource('cloud')} className={`flex-1 py-1 text-[10px] font-bold rounded-md ${source === 'cloud' ? 'bg-white dark:bg-slate-700 text-emerald-500 shadow-sm' : 'text-stone-400'}`}>Cloud</button>
                            </div>
                        </div>
                    </div>

                    {section === 'letters' && (
                        <div className="grid grid-cols-4 gap-2 bg-white dark:bg-slate-800 p-4 rounded-2xl border dark:border-slate-700 shadow-sm">
                            {alphabet.map((l, i) => (
                                <button key={i} onClick={() => playAudio(l, i)} className={`aspect-square rounded-xl border flex flex-col items-center justify-center transition-all ${playingId === i ? 'bg-amber-100 border-amber-400 dark:bg-amber-900 text-amber-600' : 'bg-stone-50 dark:bg-slate-900 dark:border-slate-700'}`}>
                                    <span className="text-3xl font-naskh">{l}</span>
                                </button>
                            ))}
                        </div>
                    )}

                    {section === 'words' && (
                        <div className="space-y-4">
                            <div className="flex bg-white dark:bg-slate-800 p-1 rounded-xl border dark:border-slate-700 shadow-sm">
                                {['short', 'medium', 'long', 'mixed'].map(lv => (
                                    <button key={lv} onClick={() => setLen(lv)} className={`flex-1 py-1.5 text-[10px] font-bold rounded-lg capitalize ${len === lv ? 'bg-emerald-600 text-white' : 'text-stone-400'}`}>{lv}</button>
                                ))}
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                {dynamicWords.map((w, i) => (
                                    <button key={i} onClick={() => playAudio(w, `w${i}`)} className={`py-8 rounded-2xl border flex items-center justify-center transition-all ${playingId === `w${i}` ? 'bg-amber-100 border-amber-400 dark:bg-amber-900' : 'bg-white dark:bg-slate-800 dark:border-slate-700'}`}>
                                        <span className="text-3xl font-naskh">{w}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {section === 'rules' && (
                        <div className="space-y-3">
                            {[{t:"Fatha (ـَ)", e:"بَ"}, {t:"Kasra (ـِ)", e:"بِ"}, {t:"Damma (ـُ)", e:"بُ"}, {t:"Sukun (ـْ)", e:"بْ"}].map((r, i) => (
                                <div key={i} className="p-4 bg-white dark:bg-slate-800 rounded-2xl border dark:border-slate-700 flex justify-between items-center shadow-sm">
                                    <span className="font-bold text-sm">{r.t}</span>
                                    <button onClick={() => playAudio(r.e, `r${i}`)} className={`w-12 h-12 rounded-lg border flex items-center justify-center text-2xl font-naskh ${playingId === `r${i}` ? 'bg-emerald-100 border-emerald-500 text-emerald-600' : 'bg-stone-50 dark:bg-slate-900 dark:border-slate-700'}`}>{r.e}</button>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function Explorer({ selectedSurahForView, setSelectedSurahForView, librarySurahData, setLibrarySurahData, onSelectVerse, localDatabase, setLocalDatabase, loading, setLoading }) {
            const [expandedVerseMenu, setExpandedVerseMenu] = useState(null);
            const fileInputRef = useRef(null);

            const loadSurah = (id) => {
                setLoading(true);
                const data = (localDatabase && localDatabase.find(s => s.id === id)?.ayahs) || OFFLINE_PACK[id] || [];
                setLibrarySurahData(data);
                setSelectedSurahForView(SURAHS.find(s => s.id === id) || {id, name: "Surah "+id, english: ""});
                setLoading(false);
            };

            const handleFileUpload = async (e) => {
                const files = Array.from(e.target.files);
                let newSurahs = [];
                for (const file of files) {
                    try {
                        const text = await file.text();
                        const data = JSON.parse(text);
                        if (Array.isArray(data)) newSurahs = [...newSurahs, ...data];
                    } catch (err) { console.error(err); }
                }
                if (newSurahs.length > 0) {
                    setLocalDatabase(prev => {
                        const merged = [...prev];
                        newSurahs.forEach(ns => {
                            const idx = merged.findIndex(s => s.id === ns.id);
                            if (idx >= 0) merged[idx] = ns; else merged.push(ns);
                        });
                        localStorage.setItem('hifz_vault_gh_v3', JSON.stringify(merged));
                        return merged;
                    });
                }
                e.target.value = null;
            };

            if (selectedSurahForView) {
                return (
                    <div className="space-y-6 animate-in fade-in pb-12" onClick={() => setExpandedVerseMenu(null)}>
                        <button onClick={() => onSelectVerse(librarySurahData[0], librarySurahData, 0, selectedSurahForView)} className="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-transform">
                            <LucideIcon name="play" className="w-5 h-5 fill-current"/> Start Memorizing Chapter
                        </button>
                        <div className="text-center">
                            <h2 className="text-2xl font-bold dark:text-white">Surah {selectedSurahForView.name}</h2>
                            <p className="text-stone-500 text-sm uppercase tracking-widest">{selectedSurahForView.english}</p>
                        </div>
                        {librarySurahData.map((v, idx) => (
                            <div key={idx} className="p-5 bg-white dark:bg-slate-800 rounded-2xl border dark:border-slate-700 shadow-sm relative group">
                                <div className="absolute top-3 right-3">
                                    <button onClick={(e) => { e.stopPropagation(); setExpandedVerseMenu(expandedVerseMenu === idx ? null : idx); }} className="p-1 text-stone-400 hover:text-stone-600 rounded-lg border dark:border-slate-700">
                                        <LucideIcon name="more-horizontal" className="w-5 h-5" />
                                    </button>
                                    {expandedVerseMenu === idx && (
                                        <div className="absolute top-8 right-0 bg-white dark:bg-slate-800 border dark:border-slate-700 shadow-xl rounded-lg p-2 z-10 w-48 animate-in">
                                            <button onClick={() => onSelectVerse(v, librarySurahData, idx, selectedSurahForView)} className="flex items-center gap-2 px-3 py-2 text-sm font-bold text-emerald-700 dark:text-emerald-400 hover:bg-stone-50 dark:hover:bg-slate-700 rounded-md w-full text-left">
                                                <LucideIcon name="target" className="w-4 h-4"/> Focus & Learn Ayah
                                            </button>
                                        </div>
                                    )}
                                </div>
                                <div className="absolute -left-2 -top-2 w-8 h-8 rounded-full bg-emerald-100 dark:bg-emerald-900 text-emerald-700 dark:text-emerald-300 flex items-center justify-center font-bold text-xs border dark:border-emerald-700 shadow-sm">
                                    {v.ayah}
                                </div>
                                <p className="text-3xl font-naskh text-right leading-relaxed mb-4 mt-2" dir="rtl">{v.arabic}</p>
                                <div className="p-3 bg-stone-50 dark:bg-slate-900/50 rounded-lg border dark:border-slate-700 text-[11px] text-emerald-600 dark:text-emerald-400 italic mb-3">
                                    {v.transliteration}
                                </div>
                                <p className="text-sm dark:text-slate-300 mb-3 leading-snug">"{v.english}"</p>
                                {v.tafsir && <div className="p-4 bg-amber-50 dark:bg-amber-900/10 rounded-xl text-[11px] text-stone-600 dark:text-slate-400 border border-amber-100 dark:border-amber-900/30 leading-relaxed">{v.tafsir}</div>}
                            </div>
                        ))}
                    </div>
                );
            }

            return (
                <div className="space-y-4">
                    <div className="p-5 bg-white dark:bg-slate-800 rounded-2xl border dark:border-slate-700 flex justify-between items-center shadow-sm">
                        <h3 className="font-bold flex items-center gap-2 text-xs uppercase tracking-widest opacity-60">Vault Manager</h3>
                        <input type="file" accept=".json" multiple ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                        <button onClick={() => fileInputRef.current?.click()} className="px-4 py-2 bg-emerald-100 dark:bg-emerald-900/40 text-emerald-800 dark:text-emerald-300 rounded-lg font-bold text-xs">Add Pack</button>
                    </div>
                    <div className="space-y-2">
                        {SURAHS.map(s => (
                            <div key={s.id} onClick={() => loadSurah(s.id)} className="p-4 bg-white dark:bg-slate-800 rounded-xl border dark:border-slate-700 flex justify-between items-center shadow-sm hover:border-emerald-500 cursor-pointer group">
                                <div><p className="font-bold group-hover:text-emerald-500 transition-colors">{s.id}. {s.name}</p><p className="text-xs text-stone-500">{s.english}</p></div>
                                <div className="flex gap-2 items-center">
                                    {(localDatabase && localDatabase.some(ls => ls.id === s.id) || OFFLINE_PACK[s.id]) && <LucideIcon name="check-circle-2" className="w-4 h-4 text-emerald-500" />}
                                    <LucideIcon name="chevron-right" className="w-5 h-5 text-stone-300" />
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function Memorize({ context, setContext, memorizedAyahs, setMemorizedAyahs }) {
            const [step, setStep] = useState(1);
            const [reps, setReps] = useState(0);
            const steps = [{id:1, t:"Review"}, {id:2, t:"Listen"}, {id:3, t:"Repeat"}, {id:4, t:"Test"}];
            const target = step === 1 ? 1 : (step === 3 ? 10 : 5);
            const isDone = step === 4 && reps >= target;
            
            useEffect(() => { setStep(1); setReps(0); }, [context.verse.ayah]);

            const handleRep = (e) => {
                e.stopPropagation();
                if (reps + 1 >= target) {
                    if (step < 4) { setStep(step + 1); setReps(0); }
                    else setReps(target);
                } else setReps(reps + 1);
            };

            const log = () => {
                const key = `${context.surahInfo.id}:${context.verse.ayah}`;
                if (!memorizedAyahs.includes(key)) {
                    const next = [...memorizedAyahs, key];
                    setMemorizedAyahs(next);
                    localStorage.setItem('hifz_progress_gh_v3', JSON.stringify(next));
                }
                if (context.currentIndex < context.surahData.length - 1) {
                    const nIdx = context.currentIndex + 1;
                    setContext({...context, currentIndex: nIdx, verse: context.surahData[nIdx]});
                }
            };

            return (
                <div className="space-y-4 animate-in">
                    <div className="flex items-center justify-between bg-white dark:bg-slate-800 p-3 rounded-xl border dark:border-slate-700 shadow-sm">
                        <button disabled={context.currentIndex === 0} onClick={() => { const i = context.currentIndex - 1; setContext({...context, currentIndex: i, verse: context.surahData[i]}) }} className="p-2 text-stone-400 disabled:opacity-20"><LucideIcon name="chevron-left"/></button>
                        <h2 className="text-sm font-bold opacity-60">Surah {context.surahInfo.name} • {context.verse.ayah}</h2>
                        <button disabled={context.currentIndex === context.surahData.length - 1} onClick={() => { const i = context.currentIndex + 1; setContext({...context, currentIndex: i, verse: context.surahData[i]}) }} className="p-2 text-stone-400 disabled:opacity-20"><LucideIcon name="chevron-right"/></button>
                    </div>
                    <div className="p-8 bg-white dark:bg-slate-800 rounded-3xl border dark:border-slate-700 shadow-lg text-center relative overflow-hidden">
                        <p className="text-4xl font-naskh leading-relaxed mb-6" dir="rtl">{context.verse.arabic}</p>
                        <p className="text-emerald-500 italic text-sm mb-4">{context.verse.transliteration}</p>
                        <p className="text-sm dark:text-slate-300">"{context.verse.english}"</p>
                    </div>
                    <div className="grid grid-cols-4 gap-2">
                        {steps.map(s => (
                            <div key={s.id} className={`py-2 text-[10px] font-bold text-center rounded-lg border transition-all ${step === s.id ? 'bg-emerald-600 text-white border-emerald-500 shadow-md' : 'bg-white dark:bg-slate-800 border-stone-200 dark:border-slate-700 opacity-40'}`}>
                                {s.t}
                            </div>
                        ))}
                    </div>
                    <div className="flex gap-4">
                        <div className="flex-1 bg-white dark:bg-slate-800 rounded-2xl border dark:border-slate-700 flex items-center justify-center text-2xl font-black">{reps}/{target}</div>
                        <button onClick={handleRep} className="flex-[3] py-6 bg-emerald-600 text-white rounded-2xl font-bold shadow-xl active:scale-95 transition-all text-lg">Log Repetition</button>
                    </div>
                    {isDone && <button onClick={log} className="w-full py-5 bg-emerald-800 text-white rounded-2xl font-bold animate-bounce shadow-2xl flex items-center justify-center gap-2 mt-4"><LucideIcon name="check-circle-2"/> Save Ayah & Next</button>}
                </div>
            );
        }

        function JumpModal({ onClose, onSelect, localDatabase }) {
            const [s, setS] = useState('');
            const [a, setA] = useState('');
            const handle = () => {
                const sId = parseInt(s); const aId = parseInt(a);
                const info = SURAHS.find(item => item.id === sId) || {id: sId, name: "Surah "+sId, english: ""};
                let vs = (localDatabase && localDatabase.find(item => item.id === sId)?.ayahs) || OFFLINE_PACK[sId];
                if (!vs) { alert("Pack not in vault. Upload it first."); return; }
                const target = vs.find(v => v.ayah === aId);
                if (target) onSelect(target, vs, vs.findIndex(v => v.ayah === aId), info);
                else alert("Ayah not found.");
            };
            return (
                <div className="fixed inset-0 bg-black/70 z-[60] flex items-center justify-center p-4 backdrop-blur-sm animate-in" onClick={onClose}>
                    <div className="bg-white dark:bg-slate-800 rounded-3xl p-6 w-full max-w-sm shadow-2xl border dark:border-slate-700" onClick={e=>e.stopPropagation()}>
                        <h3 className="text-xl font-bold mb-6 text-center border-b dark:border-slate-700 pb-2">Jump to Ayah</h3>
                        <div className="space-y-4 mb-8">
                            <div><label className="text-[10px] font-bold text-stone-500 uppercase px-2 tracking-widest">Surah Number</label><input type="number" value={s} onChange={e=>setS(e.target.value)} className="w-full mt-1 bg-stone-100 dark:bg-slate-900 rounded-xl p-4 outline-none border border-transparent focus:border-emerald-500" /></div>
                            <div><label className="text-[10px] font-bold text-stone-500 uppercase px-2 tracking-widest">Ayah Number</label><input type="number" value={a} onChange={e=>setA(e.target.value)} className="w-full mt-1 bg-stone-100 dark:bg-slate-900 rounded-xl p-4 outline-none border border-transparent focus:border-emerald-500" /></div>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={onClose} className="flex-1 py-4 font-bold bg-stone-100 dark:bg-slate-700 rounded-xl">Cancel</button>
                            <button onClick={handle} className="flex-1 py-4 font-bold bg-emerald-600 text-white rounded-xl">Teleport</button>
                        </div>
                    </div>
                </div>
            );
        }

        function LowEnergyModal({ context, onClose }) {
            const [t, setT] = useState(300);
            const [active, setActive] = useState(false);
            useEffect(() => { let i; if(active && t > 0) i = setInterval(() => setT(v => v - 1), 1000); return () => clearInterval(i); }, [active, t]);
            return (
                <div className="fixed inset-x-0 bottom-0 z-[60] animate-in">
                    <div className="absolute inset-0 bg-black/50 -top-[100vh] backdrop-blur-sm" onClick={onClose}></div>
                    <div className="bg-slate-950 p-6 rounded-t-3xl border-t border-slate-800 relative shadow-2xl">
                        <div className="flex justify-between items-center mb-6">
                            <div><h2 className="text-2xl font-bold uppercase tracking-widest">Low Energy</h2><p className="text-stone-500 text-[10px] uppercase tracking-widest">Focusing: {context?.surahInfo?.name}</p></div>
                            <button onClick={onClose} className="p-2 bg-slate-900 rounded-full"><LucideIcon name="chevron-down"/></button>
                        </div>
                        <div className="bg-slate-900 p-8 rounded-2xl mb-6 flex justify-between items-center shadow-inner">
                            <div className="text-5xl font-mono font-bold text-amber-400">{Math.floor(t/60)}:{(t%60).toString().padStart(2,'0')}</div>
                            <button onClick={() => setActive(!active)} className="w-16 h-16 bg-amber-600 text-white rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform">{active ? <LucideIcon name="pause" /> : <LucideIcon name="play" />}</button>
                        </div>
                        <div className="bg-slate-900/50 p-6 rounded-xl border border-slate-800"><p className="text-3xl font-naskh text-center leading-loose" dir="rtl">{context?.verse?.arabic}</p></div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

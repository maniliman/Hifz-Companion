<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hifz Companion - v190 Navigation Compass</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --gold-primary: #d4af37;
            --gold-light: #f4d03f;
            --midnight: #0a0e17;
            --cream: #fdfaf5;
        }

        body { 
            background-color: var(--midnight); 
            color: #f8fafc; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden; 
        }
        
        .font-naskh { font-family: 'Amiri', serif; line-height: 2.2; }
        .animate-in { animation: fadeIn 0.25s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gold-primary); border-radius: 10px; opacity: 0.3; }
        
        .no-select { -webkit-user-select: none; user-select: none; }
        button:active { transform: scale(0.96); }
        
        .main-scroll-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding-bottom: calc(env(safe-area-inset-bottom) + 120px);
        }

        .verse-card {
            min-height: 320px;
            max-height: 55vh;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .verse-text-scroll {
            overflow-y: auto;
            flex: 1;
            padding-right: 8px;
            text-align: center;
        }

        .quiz-card {
            height: 180px;
            perspective: 1000px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        /* Light Mode Overrides */
        .light body { background-color: var(--cream); color: #2d3436; }
        .light .main-scroll-area { background-color: var(--cream); }
        .light .verse-card { background: white; border: 1px solid rgba(212, 175, 55, 0.3); }
        .light .quiz-card { background: white; border: 1px solid rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body class="dark">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const LucideIcon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
            return <i data-lucide={name} className={className}></i>;
        };

        const SURAHS_META = [
            { id: 1, name: "Al-Fatihah", english: "The Opener" },
            { id: 67, name: "Al-Mulk", english: "The Sovereignty" },
            { id: 78, name: "An-Naba", english: "The Tidings" },
            { id: 79, name: "An-Nazi'at", english: "Those Who Drag Forth" },
            { id: 80, name: "'Abasa", english: "He Frowned" },
            { id: 81, name: "At-Takwir", english: "The Overthrowing" },
            { id: 82, name: "Al-Infitar", english: "The Cleaving" },
            { id: 83, name: "Al-Mutaffifin", english: "The Defrauding" },
            { id: 84, name: "Al-Inshiqaq", english: "The Sundering" },
            { id: 85, name: "Al-Buruj", english: "The Mansions" },
            { id: 86, name: "At-Tariq", english: "The Nightcomer" },
            { id: 87, name: "Al-A'la", english: "The Most High" },
            { id: 88, name: "Al-Ghashiyah", english: "The Overwhelming" },
            { id: 89, name: "Al-Fajr", english: "The Dawn" },
            { id: 90, name: "Al-Balad", english: "The City" },
            { id: 91, name: "Ash-Shams", english: "The Sun" },
            { id: 92, name: "Al-Layl", english: "The Night" },
            { id: 93, name: "Ad-Duha", english: "The Morning Hours" },
            { id: 94, name: "Ash-Sharh", english: "The Relief" },
            { id: 95, name: "At-Tin", english: "The Fig" },
            { id: 96, name: "Al-'Alaq", english: "The Clot" },
            { id: 97, name: "Al-Qadr", english: "The Power" },
            { id: 98, name: "Al-Bayyinah", english: "The Clear Proof" },
            { id: 99, name: "Az-Zalzalah", english: "The Earthquake" },
            { id: 100, name: "Al-'Adiyat", english: "The Courser" },
            { id: 101, name: "Al-Qari'ah", english: "The Calamity" },
            { id: 102, name: "At-Takathur", english: "Worldly Increase" },
            { id: 103, name: "Al-'Asr", english: "The Declining Day" },
            { id: 104, name: "Al-Humazah", english: "The Traducer" },
            { id: 105, name: "Al-Fil", english: "The Elephant" },
            { id: 106, name: "Quraysh", english: "Quraysh" },
            { id: 107, name: "Al-Ma'un", english: "Small Kindnesses" },
            { id: 108, name: "Al-Kawthar", english: "Abundance" },
            { id: 109, name: "Al-Kafirun", english: "The Disbelievers" },
            { id: 110, name: "An-Nasr", english: "Divine Support" },
            { id: 111, name: "Al-Masad", english: "The Palm Fiber" },
            { id: 112, name: "Al-Ikhlas", english: "The Sincerity" },
            { id: 113, name: "Al-Falaq", english: "The Daybreak" },
            { id: 114, name: "An-Nas", english: "Mankind" }
        ];

        const FATIHAH_BUILTIN = [
            { ayah: 1, arabic: "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", transliteration: "Bismillaahir Rahmaanir Raheem", english: "In the name of Allah, the Entirely Merciful, the Especially Merciful.", tafsir: "Invoke His mercy." },
            { ayah: 2, arabic: "الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ", transliteration: "Alhamdu lillaahi Rabbil 'aalameen", english: "[All] praise is [due] to Allah, Lord of the worlds -", tafsir: "Gratitude." },
            { ayah: 3, arabic: "الرَّحْمَٰنِ الرَّحِيمِ", transliteration: "Ar-Rahmaanir-Raheem", english: "The Entirely Merciful, the Especially Merciful,", tafsir: "Mercy." },
            { ayah: 4, arabic: "مَالِكِ يَوْمِ الدِّينِ", transliteration: "Maaliki Yawmid-Deen", english: "Sovereign of the Day of Recompense.", tafsir: "Accountability." },
            { ayah: 5, arabic: "إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ", transliteration: "Iyyaaka na'budu wa iyyaaka nasta'een", english: "It is You we worship and You we ask for help.", tafsir: "Dependence." },
            { ayah: 6, arabic: "اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ", transliteration: "Ihdinas-Siraatal-Mustaqeem", english: "Guide us to the straight path -", tafsir: "Direction." },
            { ayah: 7, arabic: "صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ", transliteration: "Siraatal-ladheena an'amta 'alayhim ghayril-maghdoobi 'alayhim walad-daalleen", english: "The path of those upon whom You have bestowed favor, not of those who have evoked [Your] anger or of those who are astray.", tafsir: "Righteousness." }
        ];

        function App() {
            const [showSplash, setShowSplash] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [theme, setTheme] = useState('dark');
            const [localDatabase, setLocalDatabase] = useState([]);
            const [memorizedAyahs, setMemorizedAyahs] = useState([]);
            const [voiceGender, setVoiceGender] = useState('male');
            const [audioEngine, setAudioEngine] = useState('cloud');
            const [reciterId, setReciterId] = useState('ar.alafasy'); 

            const [learningContext, setLearningContext] = useState({
                surahInfo: SURAHS_META[0],
                verse: FATIHAH_BUILTIN[0],
                surahData: FATIHAH_BUILTIN,
                currentIndex: 0
            });

            const [selectedSurah, setSelectedSurah] = useState(null);
            const [librarySurahData, setLibrarySurahData] = useState([]);
            
            const [isFabOpen, setIsFabOpen] = useState(false);
            const [isJumpOpen, setIsJumpOpen] = useState(false);
            const [isLowEnergyOpen, setIsLowEnergyOpen] = useState(false);
            const [pendingSession, setPendingSession] = useState(null);

            useEffect(() => {
                document.body.className = theme;
            }, [theme]);

            useEffect(() => {
                const vault = localStorage.getItem('hifz_vault_v190');
                if (vault) setLocalDatabase(JSON.parse(vault));
                const progress = localStorage.getItem('hifz_progress_v190');
                if (progress) setMemorizedAyahs(JSON.parse(progress));

                const lastSession = localStorage.getItem('hifz_session_v190');
                if (lastSession) {
                    setPendingSession(JSON.parse(lastSession));
                }

                setTimeout(() => setShowSplash(false), 2200);
            }, []);

            useEffect(() => {
                if (showSplash || pendingSession) return;
                const session = { activeTab, learningContext, selectedSurah, librarySurahData };
                localStorage.setItem('hifz_session_v190', JSON.stringify(session));
            }, [activeTab, learningContext, selectedSurah, librarySurahData]);

            const handleResume = () => {
                if (pendingSession) {
                    setActiveTab(pendingSession.activeTab);
                    if (pendingSession.learningContext) setLearningContext(pendingSession.learningContext);
                    if (pendingSession.selectedSurah) setSelectedSurah(pendingSession.selectedSurah);
                    if (pendingSession.librarySurahData) setLibrarySurahData(pendingSession.librarySurahData);
                }
                setPendingSession(null);
            };

            const handleStartFresh = () => {
                setPendingSession(null);
                localStorage.removeItem('hifz_session_v190');
            };

            const handleSelectVerse = (verse, surahData, index, surahInfo) => {
                setLearningContext({ verse, surahData, currentIndex: index, surahInfo });
                setActiveTab('memorize');
                setIsFabOpen(false);
                setIsJumpOpen(false);
            };

            const logMemorized = (sId, aNum) => {
                const key = `${sId}:${aNum}`;
                if (!memorizedAyahs.includes(key)) {
                    const nextProgress = [...memorizedAyahs, key];
                    setMemorizedAyahs(nextProgress);
                    localStorage.setItem('hifz_progress_v190', JSON.stringify(nextProgress));
                }
            };

            const handleSmartBack = () => {
                if (selectedSurah) {
                    setSelectedSurah(null);
                } else if (activeTab !== 'dashboard') {
                    setActiveTab('dashboard');
                }
            };

            const playAudio = (text, surahId = null, ayahNum = null) => {
                if (surahId && ayahNum && audioEngine === 'cloud') {
                    fetch(`https://api.alquran.cloud/v1/ayah/${surahId}:${ayahNum}/${reciterId}`)
                        .then(res => res.json())
                        .then(data => {
                            if (data.data && data.data.audio) {
                                new Audio(data.data.audio).play();
                            } else playRoboticTTS(text);
                        })
                        .catch(() => playRoboticTTS(text));
                    return;
                }
                playRoboticTTS(text);
            };

            const playRoboticTTS = (text) => {
                if (audioEngine === 'cloud') {
                    const audio = new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&tl=ar&client=tw-ob&q=${encodeURIComponent(text)}`);
                    if (voiceGender === 'male') audio.playbackRate = 0.9;
                    audio.play();
                } else {
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'ar-SA';
                    u.pitch = voiceGender === 'male' ? 0.8 : 1.1;
                    window.speechSynthesis.speak(u);
                }
            };

            if (showSplash) return <SplashScreen />;

            return (
                <div className="h-screen h-[100dvh] flex flex-col relative transition-colors duration-500">
                    
                    {pendingSession && (
                        <div className="fixed inset-0 z-[200] bg-black/90 flex items-center justify-center p-6 text-center animate-in fade-in">
                            <div className="max-w-xs w-full bg-white dark:bg-[#121826] rounded-[2rem] p-8 shadow-2xl border border-[#d4af37]/20">
                                <div className="w-16 h-16 bg-[#d4af37]/10 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <LucideIcon name="bookmark" className="text-[#d4af37] w-8 h-8" />
                                </div>
                                <h2 className="text-xl font-bold mb-2">Welcome Back</h2>
                                <p className="text-sm text-stone-500 dark:text-stone-400 mb-8 leading-relaxed">
                                    Continue your journey from where you last paused?
                                </p>
                                <div className="flex flex-col gap-3">
                                    <button onClick={handleResume} className="w-full py-4 bg-[#d4af37] text-white rounded-2xl font-black active:scale-95 transition-transform shadow-lg tracking-widest uppercase text-[10px]">Resume</button>
                                    <button onClick={handleStartFresh} className="w-full py-4 bg-stone-100 dark:bg-slate-800 text-stone-500 rounded-2xl font-bold active:scale-95 transition-transform tracking-widest uppercase text-[10px]">Start Fresh</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="flex-1 overflow-hidden flex flex-col relative">
                        
                        <header className="bg-stone-50 dark:bg-[#0a0e17] text-[#2d3436] dark:text-white p-4 shadow-sm z-50 flex items-center justify-between shrink-0 pt-[env(safe-area-inset-top)] h-[calc(4rem+env(safe-area-inset-top))] border-b border-[#d4af37]/10">
                            <h1 className="text-lg font-bold tracking-[0.2em] uppercase opacity-90 mx-auto">Hifz Companion</h1>
                        </header>

                        <div className="flex-1 main-scroll-area px-4 pt-6">
                            {activeTab === 'dashboard' && <Dashboard localDatabase={localDatabase} memorizedAyahs={memorizedAyahs} />}
                            {activeTab === 'qaida' && (
                                <Qaida 
                                    localDatabase={localDatabase}
                                    gender={voiceGender} setGender={setVoiceGender} 
                                    engine={audioEngine} setEngine={setAudioEngine} 
                                    play={playRoboticTTS}
                                />
                            )}
                            {activeTab === 'explorer' && (
                                <Explorer 
                                    localDatabase={localDatabase} setLocalDatabase={setLocalDatabase}
                                    selectedSurah={selectedSurah} setSelectedSurah={setSelectedSurah}
                                    librarySurahData={librarySurahData} setLibrarySurahData={setLibrarySurahData}
                                    onSelectVerse={handleSelectVerse} playNative={playAudio}
                                />
                            )}
                            {activeTab === 'memorize' && (
                                <Memorize 
                                    context={learningContext} setContext={setLearningContext} 
                                    logMemorized={logMemorized} memorizedList={memorizedAyahs}
                                    playNative={playAudio}
                                />
                            )}
                        </div>

                        {/* SMART BACK FAB (LEFT) */}
                        {(activeTab !== 'dashboard' || selectedSurah) && (
                            <div className="fixed bottom-10 left-4 z-[70] pb-[env(safe-area-inset-bottom)] animate-in">
                                <button onClick={handleSmartBack} className="p-5 bg-white dark:bg-[#121826] text-[#d4af37] rounded-full shadow-2xl border border-[#d4af37]/30 active:scale-90 transition-all">
                                    <LucideIcon name="arrow-left" className="w-6 h-6" />
                                </button>
                            </div>
                        )}

                        {/* SUPER-FAB (RIGHT) */}
                        {isFabOpen && <div className="fixed inset-0 bg-black/70 z-[60] animate-in fade-in" onClick={() => setIsFabOpen(false)}></div>}
                        <div className="fixed bottom-10 right-4 flex flex-col items-end gap-3 z-[70] pb-[env(safe-area-inset-bottom)]">
                            {isFabOpen && (
                                <div className="flex flex-col items-end gap-3 mb-2 animate-in slide-in-from-bottom-4">
                                    <div className="flex flex-col items-end gap-3 pb-3 mb-3 border-b border-[#d4af37]/10">
                                        <FabItem icon="home" label="Home" color="text-sky-400" onClick={() => { setActiveTab('dashboard'); setSelectedSurah(null); setIsFabOpen(false); }} active={activeTab === 'dashboard'} />
                                        <FabItem icon="book" label="Library" color="text-[#d4af37]" onClick={() => { setActiveTab('explorer'); setSelectedSurah(null); setIsFabOpen(false); }} active={activeTab === 'explorer'} />
                                        <FabItem icon="target" label="Learn" color="text-rose-400" onClick={() => { setActiveTab('memorize'); setIsFabOpen(false); }} active={activeTab === 'memorize'} />
                                    </div>
                                    <FabItem icon="battery-low" label="Low Energy" color="text-orange-500" onClick={() => { setIsLowEnergyOpen(true); setIsFabOpen(false); }} />
                                    <FabItem icon="search" label="Teleport" color="text-indigo-400" onClick={() => { setIsJumpOpen(true); setIsFabOpen(false); }} />
                                    <FabItem icon="type" label="Basics" color="text-emerald-500" onClick={() => { setActiveTab('qaida'); setIsFabOpen(false); }} active={activeTab === 'qaida'} />
                                </div>
                            )}
                            <button onClick={() => setIsFabOpen(!isFabOpen)} className="p-5 bg-[#d4af37] text-white rounded-full shadow-2xl border border-[#d4af37] ring-4 ring-[#d4af37]/10 active:scale-90 transition-all">
                                <LucideIcon name={isFabOpen ? "x" : "menu"} className="w-6 h-6" />
                            </button>
                        </div>

                        {isJumpOpen && <JumpModal onClose={() => setIsJumpOpen(false)} onSelect={handleSelectVerse} localDatabase={localDatabase} />}
                        {isLowEnergyOpen && <LowEnergyModal context={learningContext} onClose={() => setIsLowEnergyOpen(false)} />}
                    </div>
                </div>
            );
        }

        function SplashScreen() {
            return (
                <div className="fixed inset-0 bg-[#0a0e17] z-[100] flex flex-col items-center justify-center text-center p-6">
                    <p className="text-7xl font-naskh text-[#d4af37] mb-8 drop-shadow-2xl animate-pulse">بِسْمِ اللَّهِ</p>
                    <h1 className="text-xl font-bold text-white tracking-[0.4em] uppercase opacity-70 mb-4">Hifz Companion</h1>
                    <div className="w-16 h-0.5 bg-[#d4af37]/30 rounded-full overflow-hidden">
                        <div className="h-full bg-[#d4af37] animate-[progress_2s_ease-in-out_infinite]" style={{width: '40%'}}></div>
                    </div>
                    <style>{`@keyframes progress { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }`}</style>
                </div>
            );
        }

        function FabItem({ icon, label, onClick, color, active }) {
            return (
                <button onClick={onClick} className={`flex items-center gap-3 group transition-all ${active ? 'scale-105' : 'opacity-85'}`}>
                    <span className={`bg-white dark:bg-[#121826] text-[10px] font-black py-1.5 px-3 rounded-lg shadow-md border uppercase tracking-widest ${active ? 'border-[#d4af37] text-[#d4af37]' : 'border-slate-800 text-slate-400'}`}>{label}</span>
                    <div className={`w-12 h-12 rounded-full shadow-lg flex items-center justify-center border transition-all ${active ? 'bg-[#d4af37]/10 border-[#d4af37]' : 'bg-white dark:bg-[#121826] border-slate-800'}`}>
                        <LucideIcon name={icon} className={`w-5 h-5 ${active ? 'text-[#d4af37]' : color}`} />
                    </div>
                </button>
            );
        }

        function Dashboard({ localDatabase, memorizedAyahs }) {
            const count = Array.isArray(memorizedAyahs) ? memorizedAyahs.length : 0;
            return (
                <div className="space-y-6 animate-in pb-12">
                    <div className="bg-gradient-to-br from-[#121826] to-[#0a0e17] p-8 rounded-[2.5rem] border border-[#d4af37]/10 text-white text-center shadow-xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-[#d4af37]/5 rounded-full -mr-16 -mt-16 blur-3xl"></div>
                        <h2 className="text-xs font-medium uppercase tracking-[0.2em] opacity-50 mb-6 font-black text-[#d4af37]">Mastery</h2>
                        <div className="w-48 h-48 mx-auto rounded-full border-[12px] border-[#d4af37]/5 flex flex-col items-center justify-center relative shadow-inner">
                            <span className="text-6xl font-black text-white">{((count/6236)*100).toFixed(1)}%</span>
                            <span className="text-[10px] uppercase opacity-40 mt-1 font-bold tracking-widest">{count} / 6236 Ayahs</span>
                        </div>
                    </div>
                    <div className="bg-white dark:bg-[#121826] p-6 rounded-[2rem] border border-[#d4af37]/10 shadow-sm">
                        <h3 className="font-bold text-[10px] uppercase tracking-[0.2em] opacity-40 mb-4 font-black">Storage Status</h3>
                        <div className="flex justify-between text-xs font-bold mb-2">
                            <span className="opacity-60">Offline Chapters</span>
                            <span className="text-[#d4af37]">{localDatabase?.length || 0} / 114</span>
                        </div>
                        <div className="w-full bg-stone-100 dark:bg-slate-900 h-1.5 rounded-full overflow-hidden shadow-inner">
                            <div className="bg-[#d4af37] h-full transition-all duration-1000" style={{width: `${((localDatabase?.length||0)/114)*100}%`}}></div>
                        </div>
                    </div>
                </div>
            );
        }

        function Qaida({ localDatabase, gender, setGender, engine, setEngine, play }) {
            const [section, setSection] = useState('letters');
            const [level, setLevel] = useState('mixed');
            const [quizWords, setQuizWords] = useState([]);

            const alphabet = [
                {l:"ا", n:"Alif"}, {l:"ب", n:"Baa"}, {l:"ت", n:"Taa"}, {l:"ث", n:"Thaa"},
                {l:"ج", n:"Jeem"}, {l:"ح", n:"Haa"}, {l:"خ", n:"Khaa"}, {l:"د", n:"Daal"},
                {l:"ذ", n:"Thaal"}, {l:"ر", n:"Raa"}, {l:"ز", n:"Zaa"}, {l:"س", n:"Seen"},
                {l:"ش", n:"Sheen"}, {l:"ص", n:"Saad"}, {l:"ض", n:"Dhaad"}, {l:"ط", n:"Taa"},
                {l:"ظ", n:"Zhaa"}, {l:"ع", n:"Ayn"}, {l:"غ", n:"Ghayn"}, {l:"ف", n:"Faa"},
                {l:"ق", n:"Qaaf"}, {l:"ك", n:"Kaaf"}, {l:"ل", n:"Laam"}, {l:"م", n:"Meem"},
                {l:"ن", n:"Noon"}, {l:"ه", n:"Haa"}, {l:"و", n:"Waaw"}, {l:"ي", n:"Yaa"}, {l:"ء", n:"Hamza"}
            ];

            const generateQuiz = () => {
                let raw = ["قُلْ", "رَبِّ", "أَحَدٌ", "الصَّمَدُ", "الْمُسْتَقِيمَ", "الْعَالَمِينَ"];
                localDatabase.forEach(s => s.ayahs?.forEach(a => {
                    if (a.arabic) raw = [...raw, ...a.arabic.split(' ')];
                }));
                const filtered = raw.filter(w => {
                    const clean = w.replace(/[\u064B-\u065F\u0670]/g, '');
                    if (clean.length < 2) return false;
                    if (level === 'short') return clean.length <= 3;
                    if (level === 'medium') return clean.length >= 4 && clean.length <= 5;
                    if (level === 'long') return clean.length >= 6;
                    return true;
                });
                const selected = [...new Set(filtered)].sort(() => 0.5 - Math.random()).slice(0, 6);
                setQuizWords(selected.map(w => ({ text: w, revealed: false })));
            };

            useEffect(() => { if (section === 'words') generateQuiz(); }, [section, level, localDatabase]);

            return (
                <div className="space-y-6 animate-in slide-in-from-right pb-12">
                    <div className="flex bg-stone-100 dark:bg-[#121826] p-1.5 rounded-2xl border border-[#d4af37]/10 shadow-sm">
                        <button onClick={() => setSection('letters')} className={`flex-1 py-3 rounded-xl text-[10px] uppercase tracking-widest font-black transition-all ${section === 'letters' ? 'bg-[#d4af37] text-white shadow-md' : 'text-stone-500'}`}>Alphabet</button>
                        <button onClick={() => setSection('words')} className={`flex-1 py-3 rounded-xl text-[10px] uppercase tracking-widest font-black transition-all ${section === 'words' ? 'bg-[#d4af37] text-white shadow-md' : 'text-stone-500'}`}>Word Quiz</button>
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                        <div className="bg-white dark:bg-[#121826] p-3 rounded-2xl border border-[#d4af37]/10 text-center shadow-sm">
                            <p className="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Voice</p>
                            <div className="flex bg-stone-100 dark:bg-slate-900 p-1 rounded-xl shadow-inner">
                                <button onClick={() => setGender('male')} className={`flex-1 py-1.5 text-[10px] font-black uppercase rounded-lg transition-all ${gender === 'male' ? 'bg-white dark:bg-slate-700 text-[#d4af37] shadow-sm' : 'text-stone-400'}`}>Male</button>
                                <button onClick={() => setGender('female')} className={`flex-1 py-1.5 text-[10px] font-black uppercase rounded-lg transition-all ${gender === 'female' ? 'bg-white dark:bg-slate-700 text-[#d4af37] shadow-sm' : 'text-stone-400'}`}>Female</button>
                            </div>
                        </div>
                        <div className="bg-white dark:bg-[#121826] p-3 rounded-2xl border border-[#d4af37]/10 text-center shadow-sm">
                            <p className="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Source</p>
                            <div className="flex bg-stone-100 dark:bg-slate-900 p-1 rounded-xl shadow-inner">
                                <button onClick={() => setEngine('local')} className={`flex-1 py-1.5 text-[10px] font-black uppercase rounded-lg transition-all ${engine === 'local' ? 'bg-white dark:bg-slate-700 text-[#d4af37] shadow-sm' : 'text-stone-400'}`}>Local</button>
                                <button onClick={() => setEngine('cloud')} className={`flex-1 py-1.5 text-[10px] font-black uppercase rounded-lg transition-all ${engine === 'cloud' ? 'bg-white dark:bg-slate-700 text-[#d4af37] shadow-sm' : 'text-stone-400'}`}>Cloud</button>
                            </div>
                        </div>
                    </div>

                    {section === 'letters' && (
                        <div className="grid grid-cols-3 gap-3 bg-white dark:bg-[#121826] p-4 rounded-[2rem] border border-[#d4af37]/10 shadow-sm">
                            {alphabet.map((item, i) => (
                                <button key={i} onClick={() => play(item.n)} className="aspect-square rounded-2xl border border-transparent bg-stone-50 dark:bg-slate-900/50 flex flex-col items-center justify-center active:scale-95 active:border-[#d4af37]/30 transition-all shadow-sm">
                                    <span className="text-4xl font-naskh mb-1 leading-none text-slate-800 dark:text-white">{item.l}</span>
                                    <span className="text-[10px] font-black text-[#d4af37] uppercase tracking-tighter">{item.n}</span>
                                </button>
                            ))}
                        </div>
                    )}

                    {section === 'words' && (
                        <div className="space-y-6">
                            <div className="flex bg-white dark:bg-[#121826] p-1 rounded-2xl border border-[#d4af37]/10 shadow-inner overflow-x-auto no-scrollbar">
                                {['short', 'medium', 'long', 'mixed'].map(l => (
                                    <button key={l} onClick={() => setLevel(l)} className={`flex-1 py-2.5 px-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${level === l ? 'bg-[#d4af37] text-white shadow-md' : 'text-stone-400'}`}>{l}</button>
                                ))}
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                {quizWords.map((w, i) => (
                                    <div key={i} onClick={() => setQuizWords(prev => prev.map((item, idx) => idx === i ? {...item, revealed: true} : item))} className="quiz-card relative rounded-[2rem] border-2 border-slate-100 dark:border-slate-800 bg-white dark:bg-[#121826] flex flex-col items-center justify-center shadow-lg active:scale-95 transition-all overflow-hidden p-4 text-center">
                                        {!w.revealed ? (
                                            <div className="animate-pulse">
                                                <LucideIcon name="eye-off" className="mx-auto mb-2 text-slate-300 dark:text-slate-600 w-6 h-6" />
                                                <span className="text-[9px] font-black uppercase text-slate-400 tracking-[0.2em]">Reveal</span>
                                            </div>
                                        ) : (
                                            <div className="animate-in fade-in flex flex-col items-center">
                                                <span className="text-4xl font-naskh mb-4 text-slate-800 dark:text-white">{w.text}</span>
                                                <button onClick={(e) => { e.stopPropagation(); play(w.text); }} className="p-3 bg-[#d4af37]/10 text-[#d4af37] rounded-full active:scale-90 border border-[#d4af37]/20 shadow-sm"><LucideIcon name="volume-2" className="w-4 h-4"/></button>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                            <button onClick={generateQuiz} className="w-full py-5 bg-[#d4af37] text-white rounded-[1.5rem] font-black uppercase tracking-[0.3em] flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-all">
                                <LucideIcon name="refresh-cw" className="w-5 h-5"/> Shuffle
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        function Explorer({ localDatabase, setLocalDatabase, selectedSurah, setSelectedSurah, librarySurahData, setLibrarySurahData, onSelectVerse, playNative }) {
            const [menu, setMenu] = useState(null);
            const fileRef = useRef(null);

            const loadSurah = (id) => {
                const info = SURAHS_META.find(s => s.id === id);
                const vaultEntry = (localDatabase || []).find(s => s.id === id);
                if (id === 1 && !vaultEntry) {
                    setSelectedSurah({...info, ayahs: FATIHAH_BUILTIN});
                    setLibrarySurahData(FATIHAH_BUILTIN);
                    return;
                }
                if (!vaultEntry) { alert("Chapter not in vault. Upload JSON."); return; }
                setSelectedSurah({...info, ...vaultEntry});
                setLibrarySurahData(vaultEntry.ayahs || []);
            };

            const upload = async (e) => {
                const files = Array.from(e.target.files);
                let news = [];
                for (const f of files) {
                    try { const t = await f.text(); const d = JSON.parse(t); if(Array.isArray(d)) news = [...news, ...d]; } catch(err){}
                }
                if(news.length > 0) {
                    setLocalDatabase(prev => {
                        const merged = [...(prev || [])];
                        news.forEach(ns => { const i = merged.findIndex(s => s.id === ns.id); if(i>=0) merged[i]=ns; else merged.push(ns); });
                        localStorage.setItem('hifz_vault_v190', JSON.stringify(merged));
                        return merged;
                    });
                }
                e.target.value = null;
            };

            if (selectedSurah) {
                return (
                    <div className="space-y-6 animate-in fade-in pb-12" onClick={() => setMenu(null)}>
                        <button onClick={() => onSelectVerse(librarySurahData[0], librarySurahData, 0, selectedSurah)} className="w-full py-5 bg-[#d4af37] text-white rounded-3xl font-black uppercase tracking-[0.2em] flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-all"><LucideIcon name="play" className="w-5 h-5 fill-current"/> Start</button>
                        <div className="text-center space-y-4">
                            <h2 className="text-3xl font-bold text-slate-800 dark:text-white tracking-wide">{selectedSurah.name}</h2>
                            {selectedSurah.intro && <div className="p-6 bg-[#d4af37]/5 border border-[#d4af37]/10 rounded-[2rem] text-left text-sm leading-relaxed text-[#d4af37] italic opacity-80 shadow-inner"><LucideIcon name="info" className="w-4 h-4 mb-2 inline-block mr-2"/>{selectedSurah.intro}</div>}
                        </div>
                        {librarySurahData.map((v, i) => (
                            <div key={i} className="p-6 bg-white dark:bg-[#121826] rounded-[2rem] border border-[#d4af37]/10 shadow-sm relative no-select group">
                                <div className="absolute top-4 right-4 flex gap-3">
                                    <button onClick={(e) => { e.stopPropagation(); playNative(v.arabic, selectedSurah.id, v.ayah); }} className="p-2 text-[#d4af37] bg-[#d4af37]/10 border border-[#d4af37]/10 rounded-xl active:scale-90 transition-all"><LucideIcon name="volume-2" className="w-4 h-4"/></button>
                                    <button onClick={(e) => { e.stopPropagation(); setMenu(menu === i ? null : i); }} className="p-2 text-stone-400 bg-stone-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl active:scale-90 transition-all"><LucideIcon name="more-horizontal" className="w-4 h-4"/></button>
                                    {menu === i && <div className="absolute top-10 right-0 bg-white dark:bg-[#121826] border border-[#d4af37]/20 shadow-2xl rounded-2xl p-2 z-10 w-48 animate-in" onClick={e=>e.stopPropagation()}><button onClick={() => {onSelectVerse(v, librarySurahData, i, selectedSurah); setMenu(null);}} className="flex items-center gap-2 px-4 py-3 text-[10px] font-black uppercase tracking-widest text-[#d4af37] w-full text-left rounded-xl hover:bg-[#d4af37]/10 transition-colors"><LucideIcon name="target" className="w-4 h-4"/> Focus Ayah</button></div>}
                                </div>
                                <div className="absolute -left-2 -top-2 w-9 h-9 rounded-full bg-[#d4af37] text-white flex items-center justify-center font-black text-xs border-4 border-[#0a0e17] shadow-lg">{v.ayah}</div>
                                <p className="text-4xl font-naskh text-right mb-6 mt-4 leading-[2.6] text-slate-800 dark:text-white" dir="rtl">{v.arabic}</p>
                                <div className="p-4 bg-stone-50 dark:bg-slate-950/50 rounded-2xl border border-[#d4af37]/5 text-[11px] text-[#d4af37] italic mb-4 leading-relaxed font-medium">{v.transliteration}</div>
                                <p className="text-sm text-stone-600 dark:text-stone-400 mb-2 leading-relaxed">"{v.english}"</p>
                                {v.tafsir && <div className="p-5 bg-stone-50 dark:bg-[#d4af37]/5 rounded-[1.5rem] text-[11px] text-stone-500 dark:text-stone-500 border-l-2 border-[#d4af37]/20 leading-relaxed italic mt-4">{v.tafsir}</div>}
                            </div>
                        ))}
                    </div>
                );
            }

            return (
                <div className="space-y-4">
                    <div className="p-6 bg-white dark:bg-[#121826] rounded-[2rem] border border-[#d4af37]/10 flex justify-between items-center shadow-sm">
                        <h3 className="font-black text-[10px] uppercase tracking-[0.3em] opacity-40">Vault</h3>
                        <div className="flex gap-2">
                           <input type="file" multiple ref={fileRef} onChange={upload} className="hidden" />
                           <button onClick={() => fileRef.current?.click()} className="px-4 py-2.5 bg-[#d4af37]/10 text-[#d4af37] border border-[#d4af37]/20 rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center gap-2 active:scale-95 shadow-sm transition-all"><LucideIcon name="plus" className="w-3 h-3"/> Add</button>
                        </div>
                    </div>
                    <div className="space-y-3 pb-12">
                        {SURAHS_META.map(s => (
                            <div key={s.id} onClick={() => loadSurah(s.id)} className="p-5 bg-white dark:bg-[#121826] rounded-[1.5rem] border border-transparent dark:border-[#d4af37]/5 flex justify-between items-center shadow-sm hover:border-[#d4af37]/30 cursor-pointer active:bg-[#d4af37]/5 transition-all">
                                <div className="flex items-center gap-4">
                                    <div className="w-8 h-8 rounded-lg bg-stone-50 dark:bg-slate-900 flex items-center justify-center text-[10px] font-black text-slate-400 border border-slate-100 dark:border-slate-800">{s.id}</div>
                                    <div><p className="font-bold text-slate-800 dark:text-white">{s.name}</p><p className="text-[10px] text-stone-500 uppercase tracking-widest font-medium">{s.english}</p></div>
                                </div>
                                <div className="flex gap-3 items-center">
                                    {((localDatabase || []).some(ls => ls.id === s.id) || s.id === 1) && <LucideIcon name="check-circle-2" className="w-4 h-4 text-[#d4af37]" />}
                                    <LucideIcon name="chevron-right" className="w-5 h-5 text-stone-300" />
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function Memorize({ context, setContext, logMemorized, memorizedList, playNative }) {
            const [step, setStep] = useState(1);
            const [reps, setReps] = useState(0);
            const steps = [{id:1, t:"Analyze", target:1}, {id:2, t:"Listen", target:5}, {id:3, t:"Repeat", target:10}, {id:4, t:"Test", target:5}];
            
            useEffect(() => { if(context) {setStep(1); setReps(0);} }, [context?.verse?.ayah, context?.surahInfo?.id]);

            const logAction = () => {
                const target = steps[step-1].target;
                if (step === 2) playNative(context.verse.arabic, context.surahInfo.id, context.verse.ayah);
                if (reps + 1 >= target) {
                    if (step < 4) { setStep(step + 1); setReps(0); }
                    else setReps(target);
                } else setReps(reps + 1);
            };

            const finalize = () => {
                logMemorized(context.surahInfo.id, context.verse.ayah);
                if (context.currentIndex < context.surahData.length - 1) {
                    const nIdx = context.currentIndex + 1;
                    setContext({...context, currentIndex: nIdx, verse: context.surahData[nIdx]});
                }
            };

            if (!context) return <div className="py-20 text-center text-stone-500 font-black uppercase text-[10px] tracking-[0.2em]">Pick a Surah to begin</div>;

            return (
                <div className="space-y-4 animate-in no-select pb-24">
                    <div className="flex items-center justify-between bg-white dark:bg-[#121826] p-3 rounded-2xl border border-[#d4af37]/10 shadow-sm shrink-0">
                        <button disabled={context.currentIndex === 0} onClick={() => { const i = context.currentIndex - 1; setContext({...context, currentIndex: i, verse: context.surahData[i]}) }} className="p-3 text-[#d4af37] bg-[#d4af37]/5 rounded-xl disabled:opacity-20 active:scale-90"><LucideIcon name="chevron-left" className="w-6 h-6"/></button>
                        <div className="text-center px-4 overflow-hidden">
                            <h2 className="text-[10px] font-black opacity-40 uppercase tracking-[0.2em] truncate">{context.surahInfo.name}</h2>
                            <span className="text-xs font-black text-[#d4af37] tracking-widest">AYAH {context.verse.ayah}</span>
                        </div>
                        <button disabled={context.currentIndex === context.surahData.length - 1} onClick={() => { const i = context.currentIndex + 1; setContext({...context, currentIndex: i, verse: context.surahData[i]}) }} className="p-3 text-[#d4af37] bg-[#d4af37]/5 rounded-xl disabled:opacity-20 active:scale-90"><LucideIcon name="chevron-right" className="w-6 h-6"/></button>
                    </div>
                    
                    <div className="verse-card p-8 rounded-[2.5rem] shadow-xl relative">
                        <button onClick={() => playNative(context.verse.arabic, context.surahInfo.id, context.verse.ayah)} className="absolute top-5 right-5 p-3 bg-[#d4af37]/10 text-[#d4af37] rounded-full active:scale-90 shadow-sm border border-[#d4af37]/20"><LucideIcon name="volume-2" className="w-6 h-6"/></button>
                        <div className="verse-text-scroll mt-6">
                            <p className="text-5xl font-naskh leading-[2.5] mb-8 text-slate-800 dark:text-white" dir="rtl">{context.verse.arabic}</p>
                            <div className="space-y-6">
                                <p className="text-[#d4af37] italic text-sm leading-relaxed font-medium bg-[#d4af37]/5 p-4 rounded-2xl">{context.verse.transliteration}</p>
                                <p className="text-base text-stone-600 dark:text-stone-400 leading-relaxed font-serif italic">"{context.verse.english}"</p>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-4 gap-2">
                        {steps.map(s => (
                            <div key={s.id} className={`py-3 text-[10px] font-black uppercase tracking-tighter text-center rounded-xl border transition-all ${step === s.id ? 'bg-[#d4af37] text-white border-[#d4af37] shadow-lg scale-105' : 'bg-slate-800/40 text-slate-600 border-transparent opacity-50'}`}>{s.t}</div>
                        ))}
                    </div>
                    <div className="flex gap-4">
                        <div className="flex-1 bg-white dark:bg-[#121826] rounded-[1.5rem] border border-[#d4af37]/20 flex items-center justify-center text-3xl font-black text-[#d4af37] shadow-inner">{reps}<span className="text-xs opacity-30 mx-1">/</span>{steps[step-1].target}</div>
                        <button onClick={logAction} className="flex-[3] py-6 bg-[#d4af37] text-white rounded-[1.5rem] font-black shadow-xl active:scale-95 transition-all text-sm uppercase tracking-[0.3em] border-b-4 border-[#b8860b]">
                            {step === 2 ? 'Play & Log' : 'Log Task'}
                        </button>
                    </div>
                    {step === 4 && reps >= steps[3].target && <button onClick={finalize} className="w-full py-6 bg-emerald-600 text-white rounded-[1.5rem] font-black animate-bounce shadow-2xl flex items-center justify-center gap-3 transition-all uppercase tracking-[0.2em] border-b-4 border-emerald-800"><LucideIcon name="check-circle-2"/> Success & Next</button>}
                </div>
            );
        }

        function JumpModal({ onClose, onSelect, localDatabase }) {
            const [s, setS] = useState('');
            const [a, setA] = useState('');
            const handle = () => {
                const sId = parseInt(s); const aId = parseInt(a);
                const info = SURAHS_META.find(item => item.id === sId);
                let vs = (localDatabase || []).find(item => item.id === sId)?.ayahs;
                if (!vs && sId === 1) vs = FATIHAH_BUILTIN;
                if (!vs) { alert("Chapter not found in vault."); return; }
                const targetIdx = vs.findIndex(v => v.ayah === aId);
                if (targetIdx >= 0) onSelect(vs[targetIdx], vs, targetIdx, {id: sId, name: info?.name || `Surah ${sId}`});
                else alert("Ayah not found.");
            };
            return (
                <div className="fixed inset-0 bg-black/80 z-[80] flex items-center justify-center p-4 backdrop-blur-md animate-in" onClick={onClose}>
                    <div className="bg-white dark:bg-[#121826] rounded-[2.5rem] p-8 w-full max-w-sm border border-[#d4af37]/20 shadow-2xl" onClick={e=>e.stopPropagation()}>
                        <h3 className="text-xl font-black mb-8 text-center uppercase tracking-[0.3em] text-[#d4af37]">Teleport</h3>
                        <div className="space-y-4 mb-8">
                            <input type="number" placeholder="Surah #" value={s} onChange={e=>setS(e.target.value)} className="w-full bg-stone-100 dark:bg-slate-900 rounded-2xl p-5 outline-none border border-transparent focus:border-[#d4af37] text-lg text-slate-800 dark:text-white shadow-inner font-black" />
                            <input type="number" placeholder="Ayah #" value={a} onChange={e=>setA(e.target.value)} className="w-full bg-stone-100 dark:bg-slate-900 rounded-2xl p-5 outline-none border border-transparent focus:border-[#d4af37] text-lg text-slate-800 dark:text-white shadow-inner font-black" />
                        </div>
                        <div className="flex gap-4">
                            <button onClick={onClose} className="flex-1 py-4 font-black bg-stone-100 dark:bg-slate-800 text-stone-500 rounded-2xl uppercase tracking-widest text-[10px]">Cancel</button>
                            <button onClick={handle} className="flex-1 py-4 font-black bg-[#d4af37] text-white rounded-2xl shadow-lg uppercase tracking-widest text-[10px] active:scale-95">Go</button>
                        </div>
                    </div>
                </div>
            );
        }

        function LowEnergyModal({ context, onClose }) {
            const [t, setT] = useState(300);
            const [active, setActive] = useState(false);
            useEffect(() => { let i; if(active && t > 0) i = setInterval(() => setT(v => v - 1), 1000); return () => clearInterval(i); }, [active, t]);
            return (
                <div className="fixed inset-x-0 bottom-0 z-[80] animate-in slide-in-from-bottom">
                    <div className="absolute inset-0 bg-black/60 -top-[100vh] backdrop-blur-sm" onClick={onClose}></div>
                    <div className="bg-[#0a0e17] p-8 rounded-t-[3rem] border-t border-[#d4af37]/20 relative shadow-2xl text-center">
                        <div className="w-12 h-1.5 bg-slate-800 rounded-full mx-auto mb-8 opacity-20"></div>
                        <h2 className="text-[10px] font-black uppercase mb-2 tracking-[0.4em] text-[#d4af37]">Low Energy Mode</h2>
                        <div className="bg-slate-900/50 p-10 rounded-[2rem] mb-8 flex justify-between items-center shadow-inner border border-white/5">
                            <div className="text-left">
                                <span className="text-4xl font-black text-white font-mono">{Math.floor(t/60)}:{(t%60).toString().padStart(2,'0')}</span>
                                <p className="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-1">Focus Timer</p>
                            </div>
                            <button onClick={() => setActive(!active)} className="w-20 h-20 bg-[#d4af37] text-white rounded-full flex items-center justify-center active:scale-90 transition-all shadow-[0_0_30px_rgba(212,175,55,0.3)]">
                                <LucideIcon name={active ? "pause" : "play"} className="w-8 h-8 fill-current" />
                            </button>
                        </div>
                        <div className="p-6 bg-white/5 rounded-2xl border border-white/5"><p className="text-4xl font-naskh text-center leading-relaxed text-white/90" dir="rtl">{context?.verse?.arabic}</p></div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
